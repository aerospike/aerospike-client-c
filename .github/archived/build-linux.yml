# # ─────────────────────────────────────────────────────────────────────────────
# # Builds, tests and packages the Aerospike C client on every Linux distro for
# # BOTH amd64 and arm64, using the OPTIMIZED multi-stage Dockerfiles in
# # docker/build-optimized/<distro>/Dockerfile to provision the build environment.
# #
# # Each matrix entry = (distro, arch):
# #   resolve  – expands the distro/arch inputs into a {distro,arch,runner} matrix
# #   build    – build the optimized image, then run, inside that container:
# #                build   → make EVENT_LIB=<lib> all
# #                test    → make EVENT_LIB=<lib> AS_HOST=<server> test
# #                package → make package  (loops all event libs + builds docs)
# #
# # Architecture → runner (native, no QEMU — arm64 tests run at full speed):
# #   amd64 → ubuntu-24.04        arm64 → ubuntu-24.04-arm
# # (Swap these for [self-hosted, linux, <arch>] if hosted arm64 is unavailable.)
# #
# # The optimized images already contain doxygen + graphviz, so `make package`
# # (which runs `make docs`) succeeds inside the container.
# # ─────────────────────────────────────────────────────────────────────────────

