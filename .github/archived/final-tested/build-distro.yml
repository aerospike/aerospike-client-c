name: Aerospike C Client - Distro Build & Test (base containers)


# ─────────────────────────────────────────────────────────────────────────────
# Builds, tests, docs and packages the Aerospike C client on each Linux distro
# WITHOUT a pre-built build image. Each matrix entry runs inside the vanilla
# distro *base* container (ubuntu:24.04, debian:12, ubi9/ubi-minimal, ...) and
# fully provisions itself at runtime via a single, unconditional call:
#
#     .github/bin/install_deps.bash <distro> [event-lib]
#
# build  (distro × event_lib matrix — up to 8 distros × 4 event libs = 32 jobs):
#   - Installs deps for the specific event lib (or none for sync)
#   - Compiles the client + runs the full test suite against a service container
#
# package (distro matrix — 8 jobs, runs after ALL build jobs pass):
#   - Installs deps for all 3 async event libs in one step
#   - Runs `make package` which rebuilds all 4 variants + source zip + docs
#   - Uploads packages and docs artifacts
#
# workflow_dispatch input `event-lib`:
#   all (default) → full matrix: sync + libev + libuv + libevent
#   sync / libev / libuv / libevent → single-variant run for fast iteration
#
# The Aerospike server runs as a GitHub Actions *service* container (sibling on
# the job's network), reachable from the job container by the hostname
# `aerospike`; tests target it with `make AS_HOST=aerospike test`.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [test-workflow-stage]
  workflow_dispatch:
    inputs:
      event-lib:
        type: choice
        required: false
        default: libevent
        description: 'Event library to build + test (all = full matrix)'
        options: [all, sync, libev, libuv, libevent]
      server-tag:
        type: string
        required: false
        default: 8.1.2.0
        description: 'aerospike/aerospike-server image tag for the test step'
      run-jobs:
        type: choice
        required: false
        default: build-test
        description: 'Which jobs to run'
        options: [build-test, package, all]

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: distro-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Resolve event-lib matrix ─────────────────────────────────────────────
  # Translates the `event-lib` input into a JSON array consumed by the build
  # job matrix. On push or when input is `all`, all 4 variants are tested.
  get-distro-matrix:
    name: resolve / event-lib matrix
    runs-on: ubuntu-24.04
    outputs:
      event_libs: ${{ steps.resolve.outputs.event_libs }}
    steps:
      - id: resolve
        run: |
          case "${{ inputs.event-lib }}" in
            sync)     M='["sync"]' ;;
            libev)    M='["libev"]' ;;
            libuv)    M='["libuv"]' ;;
            libevent) M='["libevent"]' ;;
            *)        M='["sync","libev","libuv","libevent"]' ;;
          esac
          echo "event_libs=$M" >> "$GITHUB_OUTPUT"

  # ── Build + test ─────────────────────────────────────────────────────────
  # Matrix: distro × event_lib (up to 8 × 4 = 32 jobs).
  # sync builds need no event lib installed and pass no EVENT_LIB to make.
  build:
    name: ${{ matrix.distro }} / ${{ matrix.event_lib }}
    needs: get-distro-matrix
    if: ${{ inputs.run-jobs == 'build-test' || inputs.run-jobs == 'all' || inputs.run-jobs == '' }}
    runs-on: ubuntu-24.04

    container:
      image: ${{ matrix.container }}

    # GitHub puts the job container and service containers on the same bridge
    # network. The service is reachable from the job container by its key name
    # ("aerospike") as a hostname — no docker socket, no IP resolution needed.
    services:
      aerospike:
        image: aerospike/aerospike-server:${{ inputs.server-tag || '8.1.2.0' }}
        env:
          DEFAULT_TTL: "2592000"
        ports:
          - 3000:3000

    strategy:
      fail-fast: false
      matrix:
        distro:
          - ubuntu-22.04
          - ubuntu-24.04
          - debian-12
          - debian-13
          - amazonlinux-2023
          - rhel-8
          - rhel-9
          - rhel-10
        event_lib: ${{ fromJSON(needs.get-distro-matrix.outputs.event_libs) }}
        include:
          - distro: ubuntu-22.04
            container: ubuntu:22.04
          - distro: ubuntu-24.04
            container: ubuntu:24.04
          - distro: debian-12
            container: debian:12
          - distro: debian-13
            container: debian:trixie
          - distro: amazonlinux-2023
            container: amazonlinux:2023
          - distro: rhel-8
            container: registry.access.redhat.com/ubi8/ubi-minimal
          - distro: rhel-9
            container: registry.access.redhat.com/ubi9/ubi-minimal
          - distro: rhel-10
            container: registry.access.redhat.com/ubi10/ubi-minimal

    env:
      EVENT_LIB: ${{ matrix.event_lib }}
      # Event libs install into /usr/local; make test passes -L/usr/local/lib,
      # but the runtime linker still needs this for the test binary.
      LD_LIBRARY_PATH: /usr/local/lib:/usr/local/lib64

    steps:
      # actions/checkout needs git inside the container; base images lack it.
      - name: Install checkout prerequisites
        run: |
          set -euo pipefail
          case "${{ matrix.distro }}" in
            ubuntu-*|debian-*)
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y --no-install-recommends git ca-certificates
              ;;
            amazonlinux-*)
              dnf install -y git tar gzip
              ;;
            rhel-*)
              microdnf install -y git tar gzip
              ;;
          esac
          git --version

      - name: Checkout client
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          bash "$GITHUB_WORKSPACE/.github/script/install_deps.bash" \
            "${{ matrix.distro }}" "${EVENT_LIB}"

      - name: Build (${{ matrix.event_lib }})
        run: |
          set -euo pipefail
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"
          make clean
          if [ "${EVENT_LIB}" = "sync" ]; then
            make all
          else
            make EVENT_LIB="${EVENT_LIB}" all
          fi

      - name: Test (${{ matrix.event_lib }})
        run: |
          set -euo pipefail
          if [ "${EVENT_LIB}" = "sync" ]; then
            make AS_HOST=aerospike test
          else
            make EVENT_LIB="${EVENT_LIB}" AS_HOST=aerospike test
          fi

  # ── Package + docs ────────────────────────────────────────────────────────
  # Runs once per distro after ALL build+test jobs pass.
  # pkg/package rebuilds every event-lib variant + the source zip and runs
  # `make docs` (doxygen) itself, so EVENT_LIB is intentionally not passed.
  # install_deps.bash is called without an event-lib arg → installs all 3.
  package:
    name: package / ${{ matrix.distro }}
    needs: [get-distro-matrix, build]
    if: |
      always() &&
      (inputs.run-jobs == 'package' || inputs.run-jobs == 'all' || inputs.run-jobs == '') &&
      (needs.build.result == 'success' || needs.build.result == 'skipped')
    runs-on: ubuntu-24.04

    container:
      image: ${{ matrix.container }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: ubuntu-22.04
            container: ubuntu:22.04
          - distro: ubuntu-24.04
            container: ubuntu:24.04
          - distro: debian-12
            container: debian:12
          - distro: debian-13
            container: debian:trixie
          - distro: amazonlinux-2023
            container: amazonlinux:2023
          - distro: rhel-8
            container: registry.access.redhat.com/ubi8/ubi-minimal
          - distro: rhel-9
            container: registry.access.redhat.com/ubi9/ubi-minimal
          - distro: rhel-10
            container: registry.access.redhat.com/ubi10/ubi-minimal

    env:
      LD_LIBRARY_PATH: /usr/local/lib:/usr/local/lib64

    steps:
      - name: Install checkout prerequisites
        run: |
          set -euo pipefail
          case "${{ matrix.distro }}" in
            ubuntu-*|debian-*)
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y --no-install-recommends git ca-certificates
              ;;
            amazonlinux-*)
              dnf install -y git tar gzip
              ;;
            rhel-*)
              microdnf install -y git tar gzip
              ;;
          esac

      - name: Checkout client
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # Pass "all" → installs libev + libuv + libevent in one shot.
      # pkg/package needs all of them since it rebuilds every variant.
      - name: Install dependencies (all event libs)
        run: |
          bash "$GITHUB_WORKSPACE/.github/script/install_deps.bash" \
            "${{ matrix.distro }}" all

      - name: Package + docs (make package)
        run: |
          set -euo pipefail
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"
          make package

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.distro }}
          path: target/packages/*
          if-no-files-found: error
          retention-days: 1

      - name: Upload docs
        uses: actions/upload-artifact@v4
        with:
          name: docs-${{ matrix.distro }}
          path: target/docs/**
          if-no-files-found: warn
          retention-days: 1

  # ── Summary ───────────────────────────────────────────────────────────────
  summary:
    name: summary
    if: always()
    needs:
      - build
      - package
    runs-on: ubuntu-24.04
    steps:
      - name: Write run summary
        run: |
          icon() {
            case "$1" in
              success) echo "✅" ;;
              failure) echo "❌" ;;
              skipped) echo "⏭️" ;;
              *)       echo "⚠️" ;;
            esac
          }
          BUILD="${{ needs.build.result }}"
          PKG="${{ needs.package.result }}"
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Aerospike C Client — Distro Build & Test (base containers)

          | | Value |
          |---|---|
          | **Event lib** | \`${{ inputs.event-lib || 'all' }}\` |
          | **Server** | \`aerospike/aerospike-server:${{ inputs.server-tag || '8.1.2.0' }}\` |
          | **Build env** | distro base images + \`.github/bin/install_deps.bash\` |

          | Job | Result |
          |---|---|
          | Build + test (distro × event-lib) | $(icon "$BUILD") \`$BUILD\` |
          | Package + docs (per distro) | $(icon "$PKG") \`$PKG\` |
          EOF
