name: Build and Test

run-name: >-
  ${{ github.event_name == 'pull_request'
    && format('Build & Test — PR #{0} ({1})', github.event.pull_request.number, github.event.pull_request.title)
    || format('Build & Test — {0}', github.ref_name) }}

# Reusable build + test workflow for the Aerospike C client.
# Callers pass distro JSON, runner labels, server tag, and platform toggles.
# Linux builds run inside distro containers; macOS and Windows run natively.

on:
  workflow_call:
    inputs:
      linux-distros-json:
        description: >
          REQUIRED. Distros-only JSON (no runners key).
          PR:      ubuntu-22.04 JSON hardcoded in pr-open.yml.
          Nightly: vars.LINUX_DISTRO_MATRIX.
        required: true
        type: string

      runners-json:
        description: >
          REQUIRED. Arch → runner label map.
          Pass vars.LINUX_RUNNERS or hardcode the fallback.
          Example: {"amd64":"ubuntu-24.04","arm64":"ubuntu-24.04-arm"}
        required: true
        type: string

      event-lib:
        description: 'Event library. "all" expands to sync+libev+libuv+libevent.'
        required: false
        type: string
        default: all

      server-tag:
        description: 'Aerospike server Docker image tag'
        required: false
        type: string
        default: latest

      num-nodes:
        description: 'Aerospike cluster node count (2+ requires AES_FEATURES_CONF secret)'
        required: false
        type: string
        default: '3'

      server-config-content:
        description: 'Optional Aerospike server configuration content'
        required: false
        type: string
        default: ''

      valgrind:
        description: 'Include configured Valgrind runs in the Linux matrix'
        required: false
        type: boolean
        default: false

      valgrind-targets-json:
        description: 'Distro/arch pairs that get Valgrind when valgrind=true'
        required: false
        type: string

      run-mac:
        description: 'Run macOS ARM64 self-hosted build+test'
        required: false
        type: boolean
        default: false

      run-windows:
        description: 'Run Windows x64 build+test'
        required: false
        type: boolean
        default: false

      check-doc-lint:
        description: 'Run strict Doxygen lint and fail on documentation warnings'
        required: false
        type: boolean
        default: true

      ref:
        description: >
          REQUIRED. Git ref (branch, tag, or SHA) to checkout.
          PR builds:      pass github.sha (the PR merge commit).
          Nightly builds: pass "stage".
        required: true
        type: string

permissions:
  contents: read
  id-token: write   # required by setup-aerospike-server for JFrog OIDC
  checks: write
  pull-requests: write

defaults:
  run:
    shell: bash

jobs:
  # Expand distro, arch, event-lib, and valgrind inputs into one Linux matrix.
  load-matrix:
    name: matrix
    runs-on: ubuntu-24.04
    outputs:
      linux-matrix:   ${{ steps.load.outputs.linux-matrix }}
      event-libs:     ${{ steps.load.outputs.event-libs }}
      valgrind-flags: ${{ steps.load.outputs.valgrind-flags }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.ref }}

      - name: Compute matrix
        id: load
        uses: ./.github/actions/resolve-test-matrix
        with:
          linux-distros-json: ${{ inputs.linux-distros-json }}
          runners-json: ${{ inputs.runners-json }}
          event-lib:    ${{ inputs.event-lib }}
          valgrind:     ${{ inputs.valgrind }}
          valgrind-targets-json: ${{ inputs.valgrind-targets-json }}

  # Linux build/test runs inside the selected distro container.
  build-linux:
    name: ${{ matrix.distro }} ${{ matrix.arch }} / ${{ matrix.event_lib }}${{ matrix.valgrind && ' / valgrind' || '' }}
    needs: load-matrix
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.load-matrix.outputs.linux-matrix) }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout client
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.ref }}
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      # Pinned for setup-aerospike-server nofile=15000 support on ARM64 runners.
      - name: Start Aerospike server
        id: setup-aerospike
        uses: aerospike/shared-workflows/.github/actions/setup-aerospike-server@a9e883e43e0d4679ff1a250ea1ef577332a81722 # v3.8.0
        with:
          oidc-provider: ${{ vars.JFROG_OIDC_PROVIDER }}
          oidc-audience: ${{ vars.JFROG_OIDC_AUDIENCE }}
          server-tag: ${{ inputs.server-tag }}
          num-nodes: ${{ inputs.num-nodes }}
          features-content: ${{ secrets.AES_FEATURES_CONF }}
          config-content: ${{ inputs.server-config-content }}
          env-vars: 'DEFAULT_TTL=2592000'

      - name: Build/test Linux ${{ matrix.distro }} ${{ matrix.arch }} (${{ matrix.event_lib }}${{ matrix.valgrind && ', valgrind' || '' }})
        uses: ./.github/actions/setup-linux-distro-env
        with:
          distro:       ${{ matrix.distro }}
          container:    ${{ matrix.container }}
          arch:         ${{ matrix.arch }}
          event-lib:    ${{ matrix.event_lib }}
          network-name: ${{ steps.setup-aerospike.outputs.network-name }}
          valgrind:     ${{ matrix.valgrind }}
          junit-xml:    /workspace/test-results/${{ matrix.distro }}-${{ matrix.arch }}-${{ matrix.event_lib }}.xml

      # - name: Dump Aerospike logs on failure
      #   if: failure()
      #   run: docker logs aerospike-1 2>&1 || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: test-results-linux-${{ inputs.server-tag }}-${{ matrix.distro }}-${{ matrix.arch }}-${{ matrix.event_lib }}${{ matrix.valgrind && '-valgrind' || '' }}
          path: test-results/*.xml
          if-no-files-found: ignore
          retention-days: 1

  # Doxygen lint
  lint-docs:
    name: lint docs
    if: inputs.check-doc-lint
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout client
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.ref }}
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run docs lint
        uses: ./.github/actions/build-api-docs
        with:
          diagnostics-artifact-name: doxygen-diagnostics-${{ inputs.server-tag }}-${{ inputs.num-nodes }}node
          fail-on-warnings: 'true'

  # macOS ARM64 build (GitHub-hosted). Tests run on self-hosted below.
  build-mac:
    name: macOS arm64 build / ${{ matrix.event_lib }}
    if: inputs.run-mac
    needs: load-matrix
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        event_lib: ${{ fromJSON(needs.load-matrix.outputs.event-libs) }}

    steps:
      - name: Checkout client
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.ref }}
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install build dependencies
        run: |
          set -e
          echo "Homebrew version:"
          brew --version
          echo "Installing dependencies..."
          brew install cmake autoconf automake libtool openssl@3 pkg-config wget libyaml

      - name: Install event library (/usr/local)
        if: matrix.event_lib != 'sync'
        run: |
          case "${{ matrix.event_lib }}" in
            libev)    ./install_libev ;;
            libuv)    ./install_libuv ;;
            libevent) ./install_libevent ;;
          esac

      # install_lib* puts libs in /usr/local/lib. EXT_LDFLAGS is read by project/test.mk
      # as-is; prepend /usr/local so -lev/-luv/-levent resolve there before Homebrew.
      - name: Build macOS arm64 (${{ matrix.event_lib }})
        env:
          EXT_LDFLAGS: -L/usr/local/lib -Wl,-rpath,/usr/local/lib
        run: |
          export MAKEFLAGS="-j$(sysctl -n hw.ncpu)"
          if [ "${{ matrix.event_lib }}" = "sync" ]; then
            make all test-build
          else
            make EVENT_LIB=${{ matrix.event_lib }} all test-build
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: build-macos-arm64-${{ matrix.event_lib }}
          path: |
            target/
            src/test/**/*.lua
          retention-days: 1

  # macOS ARM64 test
  # TODO: macOS self-hosted runner currently uses a single Aerospike node.
  test-mac:
    name: macOS arm64 test / ${{ matrix.event_lib }}
    if: inputs.run-mac
    needs: [load-matrix, build-mac]
    runs-on: [self-hosted, macOS, ARM64]
    strategy:
      fail-fast: false
      matrix:
        event_lib: ${{ fromJSON(needs.load-matrix.outputs.event-libs) }}

    steps:
      - name: Checkout install scripts
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 1
          sparse-checkout: |
            install_libev
            install_libuv
            install_libevent
          sparse-checkout-cone-mode: false

      - name: Download build artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: build-macos-arm64-${{ matrix.event_lib }}
          path: ${{ github.workspace }}

      # Event libs link from /usr/local (install_lib*). libyaml, openssl@3, wget,
      # autoconf, automake, and libtool are pre-provisioned on the self-hosted Mac runner.
      - name: Install event library (/usr/local)
        if: matrix.event_lib != 'sync'
        run: |
          set -euo pipefail
          export PKG_CONFIG_PATH="$(brew --prefix openssl@3)/lib/pkgconfig${PKG_CONFIG_PATH:+:$PKG_CONFIG_PATH}"
          case "${{ matrix.event_lib }}" in
            libev)    ./install_libev ;;
            libuv)    ./install_libuv ;;
            libevent) ./install_libevent ;;
          esac

      # Fail fast if the self-hosted runner's Colima Docker daemon is down.
      - name: Verify Docker (colima)
        run: docker info --format 'OSType={{.OSType}} Server={{.ServerVersion}}'

      - name: Start Aerospike server
        id: setup-aerospike
        uses: aerospike/shared-workflows/.github/actions/setup-aerospike-server@a9e883e43e0d4679ff1a250ea1ef577332a81722 # v3.8.0
        with:
          oidc-provider: ${{ vars.JFROG_OIDC_PROVIDER }}
          oidc-audience: ${{ vars.JFROG_OIDC_AUDIENCE }}
          server-tag: ${{ inputs.server-tag }}
          num-nodes: '1'
          startup-timeout: "60"
          features-content: ${{ secrets.AES_FEATURES_CONF }}
          config-content: ${{ inputs.server-config-content }}
          env-vars: 'DEFAULT_TTL=2592000'

      # macOS tests run on the host, so connect through the IPv4 loopback port.
      - name: Test macOS arm64 (${{ matrix.event_lib }})
        env:
          AS_PORT: ${{ steps.setup-aerospike.outputs.service-ports }}
          JUNIT_XML: ${{ github.workspace }}/test-results/macos-arm64-${{ matrix.event_lib }}.xml
        run: |
          mkdir -p test-results
          chmod +x target/Darwin-arm64/test/aerospike_test
          for _ in {1..30}; do
            nc -z 127.0.0.1 "$AS_PORT" && break
            sleep 1
          done
          nc -z 127.0.0.1 "$AS_PORT"
          target/Darwin-arm64/test/aerospike_test -h 127.0.0.1 -p "$AS_PORT"

      - name: Dump server logs on failure
        if: failure()
        run: docker logs aerospike-1 2>&1 || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: test-results-macos-arm64-${{ inputs.server-tag }}-${{ matrix.event_lib }}
          path: test-results/*.xml
          if-no-files-found: ignore
          retention-days: 1



  # Windows x64 build (GitHub-hosted: v143 toolset). Tests run on self-hosted below.
  build-windows:
    name: windows x64 build / ${{ matrix.config }}
    if: inputs.run-windows
    runs-on: windows-2022

    strategy:
      fail-fast: false
      matrix:
        config: [Release, "Release libuv", "Release libevent"]

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.ref }}
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup NuGet
        uses: NuGet/setup-nuget@b26b823c478ee115be5c9403e62c90b0bf943843 # v3.1.0

      - name: Cache NuGet packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: vs\packages
          key: nuget-${{ hashFiles('vs/**/packages.config') }}
          restore-keys: nuget-

      - name: Restore NuGet packages
        shell: cmd
        run: nuget restore vs\aerospike.sln

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce # v2

      - name: Build Windows x64 library + test (${{ matrix.config }})
        shell: pwsh
        run: |
          $slnDir = (Resolve-Path "vs").Path + "\"
          msbuild vs\aerospike\aerospike.vcxproj `
            "/p:Configuration=${{ matrix.config }}" /p:Platform=x64 `
            "/p:SolutionDir=$slnDir" /m /nologo
          msbuild vs\aerospike-test\aerospike-test.vcxproj `
            "/p:Configuration=${{ matrix.config }}" /p:Platform=x64 `
            "/p:SolutionDir=$slnDir" /m /nologo

      - name: Upload build artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: build-windows-${{ matrix.config }}
          path: |
            vs\x64\${{ matrix.config }}\
            src\test\**\*.lua
          retention-days: 1

  # Windows x64 test
  test-windows:
    name: windows x64 test / ${{ matrix.config }}
    if: inputs.run-windows
    needs: build-windows
    runs-on: [self-hosted, windows, x64]

    strategy:
      fail-fast: false
      matrix:
        config: [Release, "Release libuv", "Release libevent"]

    steps:
      - name: Verify Docker (Linux daemon)
        shell: pwsh
        run: |
          $os = docker info --format '{{.OSType}}'
          if ($os -ne 'linux') { Write-Error "Expected Linux daemon, got: $os"; exit 1 }

      - name: Resolve Aerospike host
        shell: pwsh
        run: |
          $h = $env:DOCKER_HOST -replace '^tcp://','' -replace ':\d+$',''
          echo "AEROSPIKE_HOST=$h" >> $env:GITHUB_ENV

      # Named Docker volumes work with the remote Linux daemon used by Windows.
      - name: Start Aerospike server
        id: setup-aerospike
        uses: aerospike/shared-workflows/.github/actions/setup-aerospike-server@a9e883e43e0d4679ff1a250ea1ef577332a81722 # v3.8.0
        with:
          oidc-provider:    ${{ vars.JFROG_OIDC_PROVIDER }}
          oidc-audience:    ${{ vars.JFROG_OIDC_AUDIENCE }}
          server-tag:       ${{ inputs.server-tag }}
          num-nodes:        ${{ inputs.num-nodes }}
          features-content: ${{ secrets.AES_FEATURES_CONF }}
          config-content:   ${{ inputs.server-config-content }}
          env-vars:         'DEFAULT_TTL=2592000'

      - name: Download build artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: build-windows-${{ matrix.config }}
          path: ${{ github.workspace }}

      # Run from vs\aerospike-test so AS_START_DIR "../../" resolves src\test\lua\ correctly.
      - name: Run Windows x64 tests (${{ matrix.config }})
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE\test-results" | Out-Null
          New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE\vs\aerospike-test" | Out-Null
          $resultName = "${{ matrix.config }}" -replace '\s+', '-'
          $env:JUNIT_XML = "$env:GITHUB_WORKSPACE\test-results\windows-$resultName.xml"
          $exe = (Resolve-Path "vs\x64\${{ matrix.config }}\aerospike-test.exe").Path
          Push-Location vs\aerospike-test
          try {
            & $exe -h $env:AEROSPIKE_HOST -p 3000
            $code = $LASTEXITCODE
          } finally { Pop-Location }
          if ($code -ne 0) { exit $code }

      - name: Dump server logs on failure
        if: failure()
        shell: pwsh
        run: docker logs aerospike-1 2>&1 || true

      - name: Stop Aerospike server
        if: always()
        shell: pwsh
        run: |
          foreach ($c in "${{ steps.setup-aerospike.outputs.container-names }}".Split(',')) {
            docker rm -f $c.Trim() 2>$null
          }
          docker network rm "${{ steps.setup-aerospike.outputs.network-name }}" 2>$null; exit 0

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: test-results-windows-${{ inputs.server-tag }}-${{ matrix.config }}
          path: test-results/*.xml
          if-no-files-found: ignore
          retention-days: 1

  # Summary
  summary:
    name: summary
    if: always()
    needs: [load-matrix, build-linux, lint-docs, build-mac, test-mac, build-windows, test-windows]
    runs-on: ubuntu-24.04
    steps:
      - name: Download test results
        if: always()
        continue-on-error: true
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          pattern: test-results-*
          path: test-results
          merge-multiple: false

      - name: Publish unit test results
        if: always()
        continue-on-error: true
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2.23.0
        with:
          files: test-results/**/*.xml
          check_name: >-
            Tests — server ${{ inputs.server-tag }}
            / ${{ inputs.num-nodes }} node
            / ${{ inputs.event-lib }}
          comment_mode: off
          job_summary: true
          report_individual_runs: false

      - name: Write run summary
        env:
          R_MATRIX:  ${{ needs.load-matrix.result }}
          R_LINUX:   ${{ needs.build-linux.result }}
          R_DOCS:    ${{ needs.lint-docs.result }}
          R_MAC_BLD: ${{ needs.build-mac.result }}
          R_MAC_TST: ${{ needs.test-mac.result }}
          R_WIN_BLD: ${{ needs.build-windows.result }}
          R_WIN_TST: ${{ needs.test-windows.result }}
        run: |
          badge() {
            case "$1" in
              success)   printf '`success`'   ;;
              failure)   printf '`failure`'   ;;
              skipped)   printf '`skipped`'   ;;
              cancelled) printf '`cancelled`' ;;
              *)         printf '`%s`' "$1"   ;;
            esac
          }

          results="matrix=$R_MATRIX linux=$R_LINUX docs=$R_DOCS mac-build=$R_MAC_BLD mac-test=$R_MAC_TST win-build=$R_WIN_BLD win-test=$R_WIN_TST"

          {
            echo "## Aerospike C Client — Build & Test"
            echo ""
            echo "| Check | Result |"
            echo "| :--- | :---: |"
            echo "| Matrix setup | $(badge "$R_MATRIX") |"
            echo "| Linux distro/arch/event-lib matrix | $(badge "$R_LINUX") |"
            echo "| Doxygen lint | $(badge "$R_DOCS") |"
            echo "| macOS ARM64 build | $(badge "$R_MAC_BLD") |"
            echo "| macOS ARM64 test | $(badge "$R_MAC_TST") |"
            echo "| Windows x64 build | $(badge "$R_WIN_BLD") |"
            echo "| Windows x64 test | $(badge "$R_WIN_TST") |"
            echo ""
            echo "| Input | Value |"
            echo "| :--- | :--- |"
            echo "| Server tag | \`${{ inputs.server-tag }}\` |"
            echo "| Event lib | \`${{ inputs.event-lib }}\` |"
            echo "| Cluster nodes | \`${{ inputs.num-nodes }}\` |"
            echo "| Optional platforms | macOS: \`${{ inputs.run-mac }}\`, Windows: \`${{ inputs.run-windows }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

          # Fail the reusable workflow if any required job failed or was cancelled.
          for result in "$R_MATRIX" "$R_LINUX" "$R_DOCS" "$R_MAC_BLD" "$R_MAC_TST" "$R_WIN_BLD" "$R_WIN_TST"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "::error::One or more build/test jobs did not succeed ($results)"
              exit 1
            fi
          done
