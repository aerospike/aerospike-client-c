name: Build and Test

run-name: >-
  ${{ github.event_name == 'pull_request'
    && format('Build & Test — PR #{0} ({1})', github.event.pull_request.number, github.event.pull_request.title)
    || format('Build & Test — {0}', github.ref_name) }}

# Reusable build + test workflow for the Aerospike C client.
# Callers pass distro JSON, runner labels, server tag, and platform toggles.
# Linux builds run inside distro containers; macOS and Windows run natively.

on:
  workflow_call:
    inputs:
      matrix-json:
        description: >
          REQUIRED. Distros-only JSON (no runners key).
          PR:      ubuntu-22.04 JSON hardcoded in pr-open.yml.
          Nightly: vars.LINUX_DISTRO_MATRIX.
        required: true
        type: string

      runners-json:
        description: >
          REQUIRED. Arch → runner label map.
          Pass vars.LINUX_RUNNERS or hardcode the fallback.
          Example: {"amd64":"ubuntu-24.04","arm64":"ubuntu-24.04-arm"}
        required: true
        type: string

      event-lib:
        description: 'Event library. "all" expands to sync+libev+libuv+libevent.'
        required: false
        type: string
        default: all

      server-tag:
        description: 'Aerospike server Docker image tag'
        required: false
        type: string
        default: latest

      num-nodes:
        description: 'Aerospike cluster node count (2+ requires AES_FEATURES_CONF secret)'
        required: false
        type: string
        default: '3'

      server-config-content:
        description: 'Optional Aerospike server configuration content'
        required: false
        type: string
        default: ''

      valgrind:
        description: 'Include valgrind runs in the Linux matrix (true = both with and without; false = without only)'
        required: false
        type: boolean
        default: false

      run-mac:
        description: 'Run macOS ARM64 self-hosted build+test'
        required: false
        type: boolean
        default: false

      run-windows:
        description: 'Run Windows x64 build+test'
        required: false
        type: boolean
        default: false

      check-doc-lint:
        description: 'Run strict Doxygen lint and fail on documentation warnings'
        required: false
        type: boolean
        default: true

      ref:
        description: >
          REQUIRED. Git ref (branch, tag, or SHA) to checkout.
          PR builds:      pass github.sha (the PR merge commit).
          Nightly builds: pass "stage".
        required: true
        type: string

permissions:
  contents: read
  id-token: write   # required by setup-aerospike-server for JFrog OIDC
  checks: write
  pull-requests: write

defaults:
  run:
    shell: bash

jobs:
  # Expand distro, arch, event-lib, and valgrind inputs into one Linux matrix.
  load-matrix:
    name: load matrix
    runs-on: ubuntu-24.04
    outputs:
      linux-matrix:   ${{ steps.load.outputs.linux-matrix }}
      event-libs:     ${{ steps.load.outputs.event-libs }}
      valgrind-flags: ${{ steps.load.outputs.valgrind-flags }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref }}

      - name: Compute matrix
        id: load
        uses: ./.github/actions/resolve-test-matrix
        with:
          matrix-json:  ${{ inputs.matrix-json }}
          runners-json: ${{ inputs.runners-json }}
          event-lib:    ${{ inputs.event-lib }}
          valgrind:     ${{ inputs.valgrind }}

  # Linux build/test runs inside the selected distro container.
  build-linux:
    name: linux / ${{ matrix.distro }} / ${{ matrix.arch }} / ${{ matrix.event_lib }}${{ matrix.valgrind && ' / valgrind' || '' }}
    needs: load-matrix
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.load-matrix.outputs.linux-matrix) }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout client
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref }}
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # Pinned for setup-aerospike-server nofile=15000 support on ARM64 runners.
      - name: Start Aerospike server
        id: setup-aerospike
        uses: aerospike/shared-workflows/.github/actions/setup-aerospike-server@91bde550339d432d99123d871c7eee628aa39587
        with:
          oidc-provider: ${{ vars.JFROG_OIDC_PROVIDER }}
          oidc-audience: ${{ vars.JFROG_OIDC_AUDIENCE }}
          server-tag: ${{ inputs.server-tag }}
          num-nodes: ${{ inputs.num-nodes }}
          features-content: ${{ secrets.AES_FEATURES_CONF }}
          config-content: ${{ inputs.server-config-content }}
          env-vars: 'DEFAULT_TTL=2592000'

      - name: Install, build and test
        uses: ./.github/actions/setup-linux-distro-env
        with:
          distro:       ${{ matrix.distro }}
          container:    ${{ matrix.container }}
          arch:         ${{ matrix.arch }}
          event-lib:    ${{ matrix.event_lib }}
          network-name: ${{ steps.setup-aerospike.outputs.network-name }}
          valgrind:     ${{ matrix.valgrind }}
          junit-xml:    /workspace/test-results/${{ matrix.distro }}-${{ matrix.arch }}-${{ matrix.event_lib }}.xml

      - name: Dump Aerospike logs on failure
        if: failure()
        run: docker logs aerospike-1 2>&1 || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: test-results-linux-${{ matrix.distro }}-${{ matrix.arch }}-${{ matrix.event_lib }}${{ matrix.valgrind && '-valgrind' || '' }}
          path: test-results/*.xml
          if-no-files-found: ignore
          retention-days: 1

  # Doxygen lint
  lint-docs:
    name: lint docs
    if: inputs.check-doc-lint
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout client
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref }}
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run docs lint
        uses: ./.github/actions/build-api-docs
        with:
          diagnostics-artifact-name: doxygen-diagnostics-${{ inputs.server-tag }}-${{ inputs.num-nodes }}node
          fail-on-warnings: 'true'

  # macOS ARM64 build/test
  # TODO: macOS self-hosted runner currently uses a single Aerospike node.
  build-mac:
    name: mac / arm64 / ${{ matrix.event_lib }}
    if: inputs.run-mac
    needs: load-matrix
    runs-on: [self-hosted, macOS, ARM64]
    strategy:
      fail-fast: false
      matrix:
        event_lib: ${{ fromJSON(needs.load-matrix.outputs.event-libs) }}

    steps:
      - name: Checkout client
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref }}
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install libev
        if: matrix.event_lib == 'libev'
        run: ./install_libev

      - name: Install libuv
        if: matrix.event_lib == 'libuv'
        run: ./install_libuv

      - name: Install libevent
        if: matrix.event_lib == 'libevent'
        run: ./install_libevent

      - name: Build (${{ matrix.event_lib }})
        run: |
          if [ "${{ matrix.event_lib }}" = "sync" ]; then make
          else make EVENT_LIB=${{ matrix.event_lib }}; fi

      # Fail fast if the self-hosted runner's Colima Docker daemon is down.
      - name: Verify Docker (colima)
        run: docker info --format 'OSType={{.OSType}} Server={{.ServerVersion}}'
    
      - name: Start Aerospike server
        id: setup-aerospike
        uses: aerospike/shared-workflows/.github/actions/setup-aerospike-server@91bde550339d432d99123d871c7eee628aa39587
        with:
          oidc-provider: ${{ vars.JFROG_OIDC_PROVIDER }}
          oidc-audience: ${{ vars.JFROG_OIDC_AUDIENCE }}
          server-tag: ${{ inputs.server-tag }}
          num-nodes: '1'
          startup-timeout: "60"
          features-content: ${{ secrets.AES_FEATURES_CONF }}
          config-content: ${{ inputs.server-config-content }}
          env-vars: 'DEFAULT_TTL=2592000'

      # macOS tests run on the host, so connect through localhost.
      - name: Test (${{ matrix.event_lib }})
        env:
          AS_PORT: ${{ steps.setup-aerospike.outputs.service-ports }}
          JUNIT_XML: ${{ github.workspace }}/test-results/macos-arm64-${{ matrix.event_lib }}.xml
        run: |
          mkdir -p test-results
          if [ "${{ matrix.event_lib }}" = "sync" ]; then
            make AS_HOST=localhost AS_PORT=$AS_PORT test
          else
            make EVENT_LIB=${{ matrix.event_lib }} AS_HOST=localhost AS_PORT=$AS_PORT test
          fi

      - name: Verify cluster formation via asinfo
        uses: ./.github/actions/verify-aerospike-cluster
        with:
          network-name: ${{ steps.setup-aerospike.outputs.network-name }}
          expected-size: '1'
          container-count: '1'

      - name: Dump server logs on failure
        if: failure()
        run: docker logs aerospike-1 2>&1 || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: test-results-macos-arm64-${{ matrix.event_lib }}
          path: test-results/*.xml
          if-no-files-found: ignore
          retention-days: 1



  # Windows x64 build
  build-windows:
    name: windows / build / ${{ matrix.config }}
    if: inputs.run-windows
    runs-on: windows-2022

    strategy:
      fail-fast: false
      matrix:
        config: [Release, "Release libuv", "Release libevent"]

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref }}
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        shell: cmd
        run: nuget restore vs\aerospike.sln

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build aerospike library + test (${{ matrix.config }})
        shell: pwsh
        run: |
          $slnDir = (Resolve-Path "vs").Path + "\"
          msbuild vs\aerospike\aerospike.vcxproj `
            "/p:Configuration=${{ matrix.config }}" /p:Platform=x64 `
            "/p:SolutionDir=$slnDir" /m /nologo
          msbuild vs\aerospike-test\aerospike-test.vcxproj `
            "/p:Configuration=${{ matrix.config }}" /p:Platform=x64 `
            "/p:SolutionDir=$slnDir" /m /nologo

      - name: Upload build artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: build-windows-${{ matrix.config }}
          path: vs\x64\${{ matrix.config }}\
          retention-days: 1

  # Windows x64 test
  test-windows:
    name: windows / test / ${{ matrix.config }}
    if: inputs.run-windows
    needs: build-windows
    runs-on: [self-hosted, windows, x64]

    strategy:
      fail-fast: false
      matrix:
        config: [Release, "Release libuv", "Release libevent"]

    steps:
      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref }}

      - name: Verify Docker (Linux daemon)
        shell: pwsh
        run: |
          $os = docker info --format '{{.OSType}}'
          if ($os -ne 'linux') { Write-Error "Expected Linux daemon, got: $os"; exit 1 }

      - name: Resolve Aerospike host
        shell: pwsh
        run: |
          $h = $env:DOCKER_HOST -replace '^tcp://','' -replace ':\d+$',''
          echo "AEROSPIKE_HOST=$h" >> $env:GITHUB_ENV

      # Self-hosted runners are persistent; remove leftovers before starting.
      - name: Remove stale Aerospike containers/network (self-hosted cleanup)
        shell: pwsh
        run: |
          docker rm -f aerospike-1 2>$null; exit 0
          docker network rm aerospike-net 2>$null; exit 0

      # Named Docker volumes work with the remote Linux daemon used by Windows.
      - name: Start Aerospike server
        id: setup-aerospike
        uses: aerospike/shared-workflows/.github/actions/setup-aerospike-server@91bde550339d432d99123d871c7eee628aa39587
        with:
          oidc-provider:    ${{ vars.JFROG_OIDC_PROVIDER }}
          oidc-audience:    ${{ vars.JFROG_OIDC_AUDIENCE }}
          server-tag:       ${{ inputs.server-tag }}
          num-nodes:        ${{ inputs.num-nodes }}
          features-content: ${{ secrets.AES_FEATURES_CONF }}
          config-content:   ${{ inputs.server-config-content }}
          env-vars:         'DEFAULT_TTL=2592000'

      - name: Verify cluster formation via asinfo
        uses: ./.github/actions/verify-aerospike-cluster
        with:
          network-name: ${{ steps.setup-aerospike.outputs.network-name }}
          expected-size: ${{ inputs.num-nodes }}

      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-windows-${{ matrix.config }}
          path: vs\x64\${{ matrix.config }}

      # Run from vs\aerospike-test so UDF Lua scripts resolve correctly.
      - name: Run tests (${{ matrix.config }})
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE\test-results" | Out-Null
          $resultName = "${{ matrix.config }}" -replace '\s+', '-'
          $env:JUNIT_XML = "$env:GITHUB_WORKSPACE\test-results\windows-$resultName.xml"
          $exe = (Resolve-Path "vs\x64\${{ matrix.config }}\aerospike-test.exe").Path
          Push-Location vs\aerospike-test
          try {
            & $exe -h $env:AEROSPIKE_HOST -p 3000
            $code = $LASTEXITCODE
          } finally { Pop-Location }
          if ($code -ne 0) { exit $code }

      - name: Dump server logs on failure
        if: failure()
        shell: pwsh
        run: docker logs aerospike-1 2>&1 || true

      - name: Stop Aerospike server
        if: always()
        shell: pwsh
        run: |
          foreach ($c in "${{ steps.setup-aerospike.outputs.container-names }}".Split(',')) {
            docker rm -f $c.Trim() 2>$null
          }
          docker network rm "${{ steps.setup-aerospike.outputs.network-name }}" 2>$null; exit 0

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: test-results-windows-${{ matrix.config }}
          path: test-results/*.xml
          if-no-files-found: ignore
          retention-days: 1

  # Summary
  summary:
    name: summary
    if: always()
    needs: [load-matrix, build-linux, lint-docs, build-mac, build-windows, test-windows]
    runs-on: ubuntu-24.04
    steps:
      - name: Download test results
        if: always()
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: test-results-*
          path: test-results
          merge-multiple: false

      - name: Publish unit test results
        if: always()
        continue-on-error: true
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: test-results/**/*.xml
          check_name: Unit Test Results

      - name: Write run summary
        env:
          R_MATRIX:  ${{ needs.load-matrix.result }}
          R_LINUX:   ${{ needs.build-linux.result }}
          R_DOCS:    ${{ needs.lint-docs.result }}
          R_MAC:     ${{ needs.build-mac.result }}
          R_WIN_BLD: ${{ needs.build-windows.result }}
          R_WIN_TST: ${{ needs.test-windows.result }}
        run: |
          badge() {
            case "$1" in
              success)   printf '`success`'   ;;
              failure)   printf '`failure`'   ;;
              skipped)   printf '`skipped`'   ;;
              cancelled) printf '`cancelled`' ;;
              *)         printf '`%s`' "$1"   ;;
            esac
          }

          results="matrix=$R_MATRIX linux=$R_LINUX docs=$R_DOCS mac=$R_MAC win-build=$R_WIN_BLD win-test=$R_WIN_TST"

          {
            echo "## Aerospike C Client — Build & Test"
            echo ""
            echo "| Check | Result |"
            echo "| :--- | :---: |"
            echo "| Matrix setup | $(badge "$R_MATRIX") |"
            echo "| Linux distro/arch/event-lib matrix | $(badge "$R_LINUX") |"
            echo "| Doxygen lint | $(badge "$R_DOCS") |"
            echo "| macOS ARM64 event-lib matrix | $(badge "$R_MAC") |"
            echo "| Windows x64 build | $(badge "$R_WIN_BLD") |"
            echo "| Windows x64 test | $(badge "$R_WIN_TST") |"
            echo ""
            echo "| Input | Value |"
            echo "| :--- | :--- |"
            echo "| Server tag | \`${{ inputs.server-tag }}\` |"
            echo "| Event lib | \`${{ inputs.event-lib }}\` |"
            echo "| Cluster nodes | \`${{ inputs.num-nodes }}\` |"
            echo "| Optional platforms | macOS: \`${{ inputs.run-mac }}\`, Windows: \`${{ inputs.run-windows }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

          # Fail the reusable workflow if any required job failed or was cancelled.
          for result in "$R_MATRIX" "$R_LINUX" "$R_DOCS" "$R_MAC" "$R_WIN_BLD" "$R_WIN_TST"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "::error::One or more build/test jobs did not succeed ($results)"
              exit 1
            fi
          done
