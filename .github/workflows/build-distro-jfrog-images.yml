name: Aerospike C Client - Distro Build & Test (JFrog build images)


# ─────────────────────────────────────────────────────────────────────────────
# Functionally equivalent to build-distro.yml but instead of provisioning deps
# at runtime via install_deps.bash it pulls the pre-built, optimised build-env
# image from JFrog Artifactory for the target distro.
#
# Key structural differences from build-distro.yml:
#
#   build-distro.yml
#     build job:
#       runs-on: ubuntu-24.04          ← single amd64 runner
#       container: ubuntu:22.04        ← vanilla base image, deps installed live
#
#   this file
#     build job:
#       runs-on: ${{ matrix.arch.runner }}  ← ubuntu-24.04 (amd64) OR
#                                              ubuntu-24.04-arm (arm64)
#       (no container: directive)           ← steps run on host so Docker is
#                                              available for JFrog login + run
#       JFrog login → docker run           ← pulls the optimised image that
#                                              already has the full toolchain
#
# Why docker run from the host instead of container: directive?
#   GitHub Actions pulls the container: image before any steps run, so there is
#   no opportunity to authenticate to JFrog first.  Running steps on the host
#   and launching the distro image explicitly via docker run lets us log in
#   before the pull and still pass the Aerospike network through.
#
# Image pulled from JFrog:
#   artifact.aerospike.io/<JF_PROJECT>-docker-dev-local/
#     aerospike-client-c-<distro>:<image-tag>
#
# Two runners per distro × event-lib combination:
#   ubuntu-24.04     → linux/amd64
#   ubuntu-24.04-arm → linux/arm64
# Docker on each runner pulls the matching manifest variant automatically.
#
# build  (distro × event_lib × arch matrix — up to 8 × 4 × 2 = 64 jobs):
#   - Checks out on host, logs in to JFrog, starts Aerospike via shared action
#   - Single docker run: build + test (no deps install — image is pre-baked)
#
# package (distro × arch matrix — 8 × 2 = 16 jobs, runs after ALL build jobs):
#   - Logs in to JFrog, pulls pre-baked image
#   - Single docker run: `make package` (rebuilds all 4 event-lib variants)
#   - Uploads packages + docs artifacts
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [test-workflow-stage]
  workflow_dispatch:
    inputs:
      event-lib:
        type: choice
        required: false
        default: libevent
        description: 'Event library to build + test (all = full matrix)'
        options: [all, sync, libev, libuv, libevent]
      server-tag:
        type: string
        required: false
        default: 8.1.2.0
        description: 'Aerospike Server image tag for the test step'
      num-nodes:
        type: string
        required: false
        default: '1'
        description: >
          Number of Aerospike cluster nodes (1 = single-node, 2+ = multi-node).
          Multi-node requires the AEROSPIKE_FEATURES secret to be set (enterprise
          license). The C client connects to aerospike-1 as the seed node and
          auto-discovers the full cluster regardless of size.
      run-jobs:
        type: choice
        required: false
        default: all
        description: 'Which jobs to run'
        options: [build-test, package, all]
      image-tag:
        type: string
        required: false
        default: latest
        description: 'JFrog build-env image tag to pull (e.g. latest, 1.0.0)'

permissions:
  contents: read
  id-token: write  # required for JFrog OIDC login + setup-aerospike-server

defaults:
  run:
    shell: bash

concurrency:
  group: distro-jfrog-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Resolve event-lib matrix ─────────────────────────────────────────────
  # Translates the `event-lib` input into a JSON array consumed by the build
  # job matrix. On push or when input is `all`, all 4 variants are tested.
  get-distro-matrix:
    name: resolve / event-lib matrix
    runs-on: ubuntu-24.04
    outputs:
      event_libs: ${{ steps.resolve.outputs.event_libs }}
    steps:
      - id: resolve
        run: |
          case "${{ inputs.event-lib }}" in
            sync)     M='["sync"]' ;;
            libev)    M='["libev"]' ;;
            libuv)    M='["libuv"]' ;;
            libevent) M='["libevent"]' ;;
            *)        M='["sync","libev","libuv","libevent"]' ;;
          esac
          echo "event_libs=$M" >> "$GITHUB_OUTPUT"

  # ── Build + test ─────────────────────────────────────────────────────────
  # Matrix: distro × event_lib × arch (up to 8 × 4 × 2 = 64 jobs).
  #
  # No container: directive — steps run on the host runner so that Docker
  # commands (JFrog login, docker run, setup-aerospike-server) are available.
  # The actual build and test execute inside the JFrog image via docker run.
  build:
    name: ${{ matrix.distro }} / ${{ matrix.event_lib }} / ${{ matrix.arch.name }}
    needs: get-distro-matrix
    if: ${{ inputs.run-jobs == 'build-test' || inputs.run-jobs == 'all' || inputs.run-jobs == '' }}
    runs-on: ${{ matrix.arch.runner }}

    strategy:
      fail-fast: false
      matrix:
        distro:
          # - ubuntu-22.04
          # - ubuntu-24.04
          - debian-12
          - debian-13
          # - amazonlinux-2023
          # - rhel-8
          # - rhel-9
          # - rhel-10
        event_lib: ${{ fromJSON(needs.get-distro-matrix.outputs.event_libs) }}
        arch:
          - { name: amd64, runner: ubuntu-24.04 }
          - { name: arm64, runner: ubuntu-24.04-arm }

    env:
      EVENT_LIB: ${{ matrix.event_lib }}
      # Event libs are pre-installed into /usr/local in the JFrog image;
      # the runtime linker still needs this for the test binary.
      LD_LIBRARY_PATH: /usr/local/lib:/usr/local/lib64
      # Full JFrog image reference for this distro.
      BUILD_IMAGE: >-
        artifact.aerospike.io/${{ vars.JF_PROJECT }}-docker-dev-local/aerospike-client-c-${{ matrix.distro }}:${{ inputs.image-tag || 'latest' }}

    steps:
      # Checkout runs on the host runner (git is pre-installed).
      # The workspace is bind-mounted into the docker run below.
      - name: Checkout client
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # Exchange the GitHub OIDC token for a JFrog access token so that
      # subsequent `jf docker` commands can pull from the private registry.
      - name: Setup JFrog CLI (OIDC login)
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: https://artifact.aerospike.io
        with:
          oidc-provider-name: ${{ vars.JFROG_OIDC_PROVIDER }}
          oidc-audience: ${{ vars.JFROG_OIDC_AUDIENCE }}

      # No username/password needed here. setup-jfrog-cli already exchanged the
      # GitHub OIDC token for a JFrog access token and stored it in the JFrog
      # CLI server config. `jf docker login` reads that stored token and calls
      # `docker login <registry> --username <user> --password <access-token>`
      # under the hood, so the registry pull in the docker run below is
      # authenticated transparently.
      - name: Docker login to JFrog registry
        run: jf docker login artifact.aerospike.io

      # Starts one or more Aerospike containers on the aerospike-net Docker
      # bridge network so they are reachable by name inside docker run.
      - name: Start Aerospike server
        id: setup-aerospike
        uses: aerospike/shared-workflows/.github/actions/setup-aerospike-server@main
        with:
          oidc-provider: ${{ vars.JFROG_OIDC_PROVIDER }}
          oidc-audience: ${{ vars.JFROG_OIDC_AUDIENCE }}
          server-tag: ${{ inputs.server-tag || '8.1.2.0' }}
          num-nodes: ${{ inputs.num-nodes || '1' }}
          features-content: ${{ secrets.AEROSPIKE_FEATURES }}
          env-vars: "DEFAULT_TTL=2592000"

      # Single docker run covering build → test.
      # The JFrog image already contains the full toolchain (compiler, openssl,
      # libyaml, zlib, and all event libs), so install_deps.bash is not needed.
      #
      # --network aerospike-net  → DNS resolves "aerospike-1" to its IP
      # -v GITHUB_WORKSPACE      → source tree available at /workspace
      # -e GITHUB_WORKSPACE      → keeps all script path references unchanged
      # --platform               → explicit, matching the host runner arch
      - name: Build and test (${{ matrix.event_lib }})
        run: |
          set -euo pipefail
          docker run --rm \
            --platform linux/${{ matrix.arch.name }} \
            --network "${{ steps.setup-aerospike.outputs.network-name }}" \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            -e GITHUB_WORKSPACE=/workspace \
            -e EVENT_LIB="${EVENT_LIB}" \
            -e LD_LIBRARY_PATH="${LD_LIBRARY_PATH}" \
            "${BUILD_IMAGE}" \
            bash -c '
              set -euo pipefail

              # ── Build ─────────────────────────────────────────────────────
              git config --global --add safe.directory "${GITHUB_WORKSPACE}"
              make clean
              if [ "${EVENT_LIB}" = "sync" ]; then
                make all
              else
                make EVENT_LIB="${EVENT_LIB}" all
              fi

              # ── Test ──────────────────────────────────────────────────────
              # aerospike-1 is on the same Docker network; DNS resolves it.
              if [ "${EVENT_LIB}" = "sync" ]; then
                make AS_HOST=aerospike-1 test
              else
                make EVENT_LIB="${EVENT_LIB}" AS_HOST=aerospike-1 test
              fi
            '

  # ── Package + docs ────────────────────────────────────────────────────────
  # Runs once per distro × arch after ALL build+test jobs pass.
  # make package rebuilds every event-lib variant + source zip + docs, so
  # EVENT_LIB is not passed.  No Aerospike server is needed here.
  package:
    name: package / ${{ matrix.distro }} / ${{ matrix.arch.name }}
    needs: [get-distro-matrix, build]
    if: |
      always() &&
      (inputs.run-jobs == 'package' || inputs.run-jobs == 'all' || inputs.run-jobs == '') &&
      (needs.build.result == 'success' || needs.build.result == 'skipped')
    runs-on: ${{ matrix.arch.runner }}

    strategy:
      fail-fast: false
      matrix:
        arch:
          - { name: amd64, runner: ubuntu-24.04 }
          - { name: arm64, runner: ubuntu-24.04-arm }
        include:
          # - distro: ubuntu-22.04
          # - distro: ubuntu-24.04
          - distro: debian-12
          - distro: debian-13
          # - distro: amazonlinux-2023
          # - distro: rhel-8
          # - distro: rhel-9
          # - distro: rhel-10

    env:
      LD_LIBRARY_PATH: /usr/local/lib:/usr/local/lib64
      BUILD_IMAGE: >-
        artifact.aerospike.io/${{ vars.JF_PROJECT }}-docker-dev-local/aerospike-client-c-${{ matrix.distro }}:${{ inputs.image-tag || 'latest' }}

    steps:
      - name: Checkout client
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup JFrog CLI (OIDC login)
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: https://artifact.aerospike.io
        with:
          oidc-provider-name: ${{ vars.JFROG_OIDC_PROVIDER }}
          oidc-audience: ${{ vars.JFROG_OIDC_AUDIENCE }}

      # Same OIDC-backed token mechanism as in the build job (see comment above).
      - name: Docker login to JFrog registry
        run: jf docker login artifact.aerospike.io

      # make package rebuilds all 4 event-lib variants internally — the JFrog
      # image already has all three async libs pre-installed.
      - name: Package + docs (make package)
        run: |
          set -euo pipefail
          docker run --rm \
            --platform linux/${{ matrix.arch.name }} \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            -e GITHUB_WORKSPACE=/workspace \
            -e LD_LIBRARY_PATH="${LD_LIBRARY_PATH}" \
            "${BUILD_IMAGE}" \
            bash -c '
              set -euo pipefail
              git config --global --add safe.directory "${GITHUB_WORKSPACE}"
              make package
            '

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.distro }}-${{ matrix.arch.name }}
          path: target/packages/*
          if-no-files-found: error
          retention-days: 1

      - name: Upload docs
        uses: actions/upload-artifact@v4
        with:
          name: docs-${{ matrix.distro }}-${{ matrix.arch.name }}
          path: target/docs/**
          if-no-files-found: warn
          retention-days: 1

  # ── Summary ───────────────────────────────────────────────────────────────
  summary:
    name: summary
    if: always()
    needs:
      - build
      - package
    runs-on: ubuntu-24.04
    steps:
      - name: Write run summary
        run: |
          icon() {
            case "$1" in
              success) echo "✅" ;;
              failure) echo "❌" ;;
              skipped) echo "⏭️" ;;
              *)       echo "⚠️" ;;
            esac
          }
          BUILD="${{ needs.build.result }}"
          PKG="${{ needs.package.result }}"
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Aerospike C Client — Distro Build & Test (JFrog build images)

          | | Value |
          |---|---|
          | **Event lib** | \`${{ inputs.event-lib || 'all' }}\` |
          | **Server** | \`aerospike-server:${{ inputs.server-tag || '8.1.2.0' }}\` |
          | **Cluster nodes** | \`${{ inputs.num-nodes || '1' }}\` |
          | **Build image tag** | \`${{ inputs.image-tag || 'latest' }}\` |
          | **Build env** | JFrog pre-baked images (amd64 + arm64) |
          | **Runners** | \`ubuntu-24.04\` (amd64), \`ubuntu-24.04-arm\` (arm64) |

          | Job | Result |
          |---|---|
          | Build + test (distro × event-lib × arch) | $(icon "$BUILD") \`$BUILD\` |
          | Package + docs (distro × arch) | $(icon "$PKG") \`$PKG\` |
          EOF
