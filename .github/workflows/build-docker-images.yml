# Build and publish Aerospike C client Linux build-environment images to JFrog.
#
# Uses .github/docker/optimal-final Dockerfiles (multi-stage, install_deps.bash-aligned).
# Native linux/amd64 + linux/arm64 only — no QEMU emulation.
#
# Images: <jf-registry>/<jf-project>-docker-dev-local/client-c-build-<distro>:<tag>

name: Build Docker Images

on:
  # push:
  #   branches: [CLIENT-4300-release-pipeline-new]
    # paths:
    #   - .github/docker/optimal-final/**
    #   - .github/workflows/build-docker-images.yml
    #   - .github/docker_images_matrix.json

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

concurrency:
  group: client-c-docker-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve-matrix:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.filter.outputs.matrix }}
      image-version: ${{ steps.version.outputs.image_version }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Resolve image version
        id: version
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.image-version }}
        run: |
          set -euo pipefail
          if [ -n "$INPUT_VERSION" ]; then
            ver="$INPUT_VERSION"
          else
            ver="1.0.${GITHUB_RUN_NUMBER}"
          fi
          echo "image_version=$ver" >> "$GITHUB_OUTPUT"
          echo "Image version: $ver"

      - name: Filter distro matrix
        id: filter
        shell: bash
        env:
          FILTER: ${{ inputs.distros }}
        run: |
          set -euo pipefail
          matrix=$(jq -c '.distros' .github/docker_images_matrix.json)
          if [ -n "$FILTER" ]; then
            IFS=',' read -ra wanted <<< "$FILTER"
            filtered=()
            for w in "${wanted[@]}"; do
              w="$(echo "$w" | xargs)"
              [ -z "$w" ] && continue
              entry=$(echo "$matrix" | jq -c --arg d "$w" '.[] | select(.distro == $d)')
              if [ -z "$entry" ]; then
                echo "::error::Unknown distro '$w'"
                exit 1
              fi
              filtered+=("$entry")
            done
            matrix=$(printf '%s\n' "${filtered[@]}" | jq -sc '.')
          fi
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "Distro matrix: $matrix"

  build-image:
    needs: resolve-matrix
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.resolve-matrix.outputs.matrix) }}
    uses: aerospike/shared-workflows/.github/workflows/reusable_docker-build-deploy.yaml@f22eb107946dad167c50a9c3e185dc6d5cba5e46
    with:
      jf-project:             ${{ vars.JFROG_PROJECT }}
      jf-url:                 ${{ vars.JFROG_PLATFORM_URL }}
      oidc-provider-name:     ${{ vars.JFROG_OIDC_PROVIDER }}
      oidc-audience:          ${{ vars.JFROG_OIDC_AUDIENCE }}
      image-name:             client-c-build-${{ matrix.distro }}
      app-name:               Aerospike C Client Build (${{ matrix.distro }})
      app-version:            ${{ needs.resolve-matrix.outputs.image-version }}
      context: .
      file:    .github/docker/optimal-final/${{ matrix.distro }}/Dockerfile
      # INFRA-560: reusable workflow splits platforms into native legs internally:
      # linux/amd64 → ubuntu-24.04, linux/arm64 → ubuntu-24.04-arm, then merges.
      platforms:              linux/amd64,linux/arm64
      jf-build-name:          client-c-docker-build-${{ matrix.distro }}
      repo-scope:             -docker-dev-local
      push:                   false
      versions-override:      ${{ matrix.distro }},latest-${{ matrix.distro }}
      attest:                 true
      sbom:                   true
