name: Aerospike C Client - macOS Build & Test

run-name: >-
  ${{ github.event_name == 'pull_request'
    && format('PR #{0}', github.event.pull_request.number)
    || github.event_name == 'push' && github.ref_name
    || 'Manual' }} — macOS ARM
  (config=${{ inputs.config || 'all' }})

# ─────────────────────────────────────────────────────────────────────────────
# Builds and tests the Aerospike C client on macOS ARM (Apple Silicon).
#
# build-mac-arm runs on the self-hosted Mac M1 runner ([self-hosted, macOS,
# ARM64]), which already has colima + Docker running as a service — so it can
# stand up an Aerospike server and run the full suite. (GitHub-hosted macOS ARM
# can't nest-virtualise, so colima/Docker is unavailable there.) The community
# server image is public, so no docker login / keychain unlock is required.
#
# Event-library matrix:
#   sync      — synchronous API, no event library
#   libev     — async with libev
#   libuv     — async with libuv
#   libevent  — async with libevent
# ─────────────────────────────────────────────────────────────────────────────

# on:
#   push:
#     branches: [test-workflow-stage]

  workflow_dispatch:
    inputs:
      config:
        type: choice
        required: false
        default: sync
        description: 'Event-library configuration (all = full matrix)'
        options: [all, sync, libev, libuv, libevent]
      run-package:
        type: boolean
        required: false
        default: true
        description: 'Also build and upload macOS packages (tarballs + source zip)'

permissions:
  id-token: write
  contents: read

env:
  CHECKOUT_SHA: ${{ github.sha }}

jobs:
  # ── Resolve event-lib matrix ─────────────────────────────────────────────
  get-mac-matrix:
    name: resolve / mac config matrix
    runs-on: ubuntu-24.04
    outputs:
      configs: ${{ steps.resolve.outputs.configs }}
    steps:
      - id: resolve
        shell: bash
        run: |
          CHOICE="${{ inputs.config }}"
          if [[ -z "$CHOICE" || "$CHOICE" == "all" ]]; then
            echo 'configs=["sync","libev","libuv","libevent"]' >> "$GITHUB_OUTPUT"
          else
            echo "configs=[\"$CHOICE\"]" >> "$GITHUB_OUTPUT"
          fi

  # ── macOS ARM: build + test (self-hosted) ─────────────────────────────────
  build-mac-arm:
    name: mac-arm / ${{ matrix.config }}
    needs: get-mac-matrix
    runs-on: [self-hosted, macOS, ARM64]

    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.get-mac-matrix.outputs.configs) }}

    steps:
      #So when your workflow step starts, $PATH already contains /opt/homebrew/bin. Adding it again is a no-op (creates a duplicate entry, which is harmless but pointless).
      #Verify it on the runner right now. ssh aerouser@192.168.177.216 'cat /Users/aerouser/actions-runner/.path'

      # Homebrew isn't on PATH by default on the self-hosted runner.
      # - name: Add Homebrew to PATH
      #   run: echo "PATH=$PATH:/opt/homebrew/bin" >> "$GITHUB_ENV"

      # - name: Install Homebrew dependencies
      #   run: brew install wget automake libtool openssl libyaml

      - name: Checkout client
        uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: ${{ env.CHECKOUT_SHA }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install libev
        if: matrix.config == 'libev'
        run: ./install_libev

      - name: Install libuv
        if: matrix.config == 'libuv'
        run: ./install_libuv

      - name: Install libevent
        if: matrix.config == 'libevent'
        run: ./install_libevent

      - name: Build (sync)
        if: matrix.config == 'sync'
        run: make

      - name: Build (async — ${{ matrix.config }})
        if: matrix.config != 'sync'
        run: make EVENT_LIB=${{ matrix.config }}

      # ── Aerospike server via the runner's pre-installed colima Docker ───────
      # The self-hosted Mac M1 runner already runs colima + Docker as a service,
      # so we only verify connectivity — no install/start. Community (public)
      # image only — never enterprise, so no docker login. See memory.md.
      - name: Verify Docker connectivity
        run: docker info --format 'OSType={{.OSType}} Server={{.ServerVersion}}'

      - name: Start Aerospike server
        run: |
          docker rm -f aerospike 2>/dev/null || true
          # colima defaults the container's nofile limit to 1024, but the
          # server config needs 15000 fds (proto-fd-max) or it aborts at
          # startup with "system file descriptors not enough". Raise it.
          docker run -d --name aerospike \
            --ulimit nofile=100000:100000 \
            -p 3000:3000 \
            -e DEFAULT_TTL=2592000 \
            aerospike/aerospike-server:8.1.2.0

      - name: Wait for Aerospike server to be ready
        run: |
          for i in $(seq 1 24); do
            if docker exec aerospike asinfo -v node &>/dev/null; then
              echo "Aerospike ready after $i attempt(s)"
              exit 0
            fi
            echo "Waiting... ($i/24)"
            sleep 5
          done
          echo "::error::Aerospike server did not become ready in time"
          exit 1

      # ── Run tests and capture output ────────────────────────────────────────
      - name: Run tests (sync)
        if: matrix.config == 'sync'
        run: make test 2>&1 | tee test-output.log
        continue-on-error: true

      - name: Run tests (async — ${{ matrix.config }})
        if: matrix.config != 'sync'
        run: make EVENT_LIB=${{ matrix.config }} test 2>&1 | tee test-output.log
        continue-on-error: true

      # ── Write test summary to GitHub step summary ───────────────────────────
      - name: Write test summary
        if: always()
        shell: bash
        run: |
          CONFIG="${{ matrix.config }}"
          BUILD_STATUS="${{ job.status }}"

          icon() {
            case "$1" in
              success)  echo "✅" ;;
              failure)  echo "❌" ;;
              skipped)  echo "⏭️" ;;
              *)        echo "⚠️" ;;
            esac
          }

          # Parse pass/fail counts from test output if available
          PASSED=$(grep -oE '[0-9]+ passed' test-output.log 2>/dev/null | tail -1 || echo "")
          FAILED=$(grep -oE '[0-9]+ failed' test-output.log 2>/dev/null | tail -1 || echo "")
          SKIPPED=$(grep -oE '[0-9]+ skipped' test-output.log 2>/dev/null | tail -1 || echo "")
          [ -z "$PASSED" ] && PASSED="—"
          [ -z "$FAILED" ] && FAILED="—"
          [ -z "$SKIPPED" ] && SKIPPED="—"

          # Collect built artifacts
          LIBS=$(find target/ -name "*.a" -o -name "*.dylib" 2>/dev/null | sort | sed 's|^target/||' | tr '\n' ' ')
          [ -z "$LIBS" ] && LIBS="_none found_"

          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## macOS ARM — \`$CONFIG\` $(icon $BUILD_STATUS)

          | Field | Value |
          |---|---|
          | **Runner** | macOS ARM64 (Apple Silicon) |
          | **Config** | \`$CONFIG\` |
          | **Build** | $(icon $BUILD_STATUS) \`$BUILD_STATUS\` |
          | **Server** | \`aerospike/aerospike-server:8.1.2.0\` (community) |

          ### Test Results

          | ✅ Passed | ❌ Failed | ⏭️ Skipped |
          |---|---|---|
          | $PASSED | $FAILED | $SKIPPED |

          ### Built Artifacts
          \`$LIBS\`

          <details>
          <summary>Full test output</summary>

          \`\`\`
          $(cat test-output.log 2>/dev/null || echo "No test output captured")
          \`\`\`

          </details>
          EOF

      - name: Dump server logs on failure
        if: failure()
        run: docker logs aerospike || true

      # Persistent runner — always remove the container so the next run is clean.
      - name: Stop Aerospike server
        if: always()
        run: docker rm -f aerospike || true

  # ── macOS ARM package ─────────────────────────────────────────────────────
  # pkg/package handles everything: clean, build all 4 variants, source zip,
  # staging, and tarballs. We just need the event libs installed first.
  build-package-mac:
    name: package / mac-arm
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run-package }}
    needs: build-mac-arm
    runs-on: [self-hosted, macOS, ARM64]

    steps:
      # Homebrew isn't on PATH by default on the self-hosted runner.
      # - name: Add Homebrew to PATH
      #   run: echo "PATH=$PATH:/opt/homebrew/bin" >> "$GITHUB_ENV"

      - name: Checkout client
        uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: ${{ env.CHECKOUT_SHA }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install async event libraries
        run: |
          ./install_libev
          ./install_libuv
          ./install_libevent

      # `make package` runs `make docs` at the end (pkg/package), which calls
      # doxygen; the doxyfile sets HAVE_DOT=YES so it also needs graphviz's `dot`.
      # Neither ships on the self-hosted runner, so packaging died with
      # "doxygen: command not found" (make docs → Error 127). Install both.
      - name: Install doxygen + graphviz (docs)
        run: brew install doxygen graphviz

      - name: Build and package all variants
        run: make package

      - name: Upload macOS ARM packages
        uses: actions/upload-artifact@v4
        with:
          name: packages-mac-arm
          path: target/packages/*
          if-no-files-found: error
          retention-days: 1

  # ── Summary ───────────────────────────────────────────────────────────────
  summary:
    name: summary
    if: always()
    needs:
      - build-mac-arm
      - build-package-mac
    runs-on: ubuntu-24.04

    steps:
      - name: Write job summary
        shell: bash
        run: |
          CONFIG="${{ inputs.config || 'all' }}"
          PKG="${{ inputs.run-package }}"

          if [[ "$CONFIG" == "all" || -z "$CONFIG" ]]; then
            MAC_CONFIGS="sync, libev, libuv, libevent"
          else
            MAC_CONFIGS="$CONFIG"
          fi

          MAC_ARM="${{ needs.build-mac-arm.result }}"
          PKG_MAC="${{ needs.build-package-mac.result }}"

          icon() {
            case "$1" in
              success)  echo "✅" ;;
              failure)  echo "❌" ;;
              skipped)  echo "⏭️" ;;
              *)        echo "⚠️" ;;
            esac
          }

          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Aerospike C Client — macOS Run Summary

          | | Value |
          |---|---|
          | **Config** | \`$CONFIG\` |
          | **Packages built** | \`$PKG\` |

          ### Build Results

          | Platform | Arch | Configurations | Tests | Result |
          |---|---|---|---|---|
          | macOS | ARM64 (Apple Silicon) | \`$MAC_CONFIGS\` | 🧪 self-hosted M1 (colima) | $(icon $MAC_ARM) \`$MAC_ARM\` |

          ### Package Artifacts

          | Platform | Artifact | Retention | Result |
          |---|---|---|---|
          | macOS ARM64 | \`packages-mac-arm\` (tarballs + source zip) | 1 day | $(icon $PKG_MAC) \`$PKG_MAC\` |
          EOF
