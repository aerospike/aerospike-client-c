name: Aerospike C Client - Windows Build

run-name: >-
  ${{ github.event_name == 'pull_request'
    && format('PR #{0}', github.event.pull_request.number)
    || github.event_name == 'push' && github.ref_name
    || 'Manual' }} — Windows x64
  (config=${{ inputs.config || 'all' }})

# ─────────────────────────────────────────────────────────────────────────────
# Builds the Aerospike C client on Windows x64 using MSBuild.
#
# build    (GitHub-hosted windows-2022, matrix carries Release + Debug names):
#   - Compiles the Release library + test binary
#   - Compiles the Debug library (packaging only, when run-package == true)
#   - Always uploads the Release artifact (the test job consumes it)
#   - Uploads the Debug artifact when run-package == true
#
# test     (self-hosted windows x64, same matrix):
#   - Downloads its Release artifact, starts an Aerospike server in Docker,
#     and runs aerospike-test.exe. Needs a checkout too — the test binary
#     loads Lua UDFs from src/test/lua relative to the repo root.
#
# package  (GitHub-hosted windows-2022, run-package == true):
#   - Downloads all build artifacts, restores NuGet deps, runs `nuget pack`
#     on the 3 .nuspec files — no rebuild.
#
#   sync → Release/Debug · libuv → Release/Debug libuv · libevent → …libevent
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [test-workflow-stage]

  workflow_dispatch:
    inputs:
      config:
        type: choice
        required: false
        default: all
        description: 'Configuration to build and test (all = full matrix)'
        options: [all, sync, libuv, libevent]
      run-package:
        type: boolean
        required: false
        default: false
        description: 'Also build and upload Windows NuGet packages (.nupkg × 3)'

permissions:
  id-token: write
  contents: read

env:
  SERVER_TAG: ${{ inputs.server-tag || '8.1.2.0' }}
  CHECKOUT_SHA: ${{ github.sha }}

jobs:
  # ── Resolve configuration matrix ─────────────────────────────────────────
  # Each entry carries the Release config name AND its matching Debug name,
  # so no Release→Debug string munging is needed downstream.
  get-windows-matrix:
    name: resolve / windows config matrix
    runs-on: ubuntu-24.04
    outputs:
      configurations: ${{ steps.resolve.outputs.configurations }}
    steps:
      - id: resolve
        shell: bash
        run: |
          sync='{"release":"Release","debug":"Debug"}'
          uv='{"release":"Release libuv","debug":"Debug libuv"}'
          ev='{"release":"Release libevent","debug":"Debug libevent"}'
          case "${{ inputs.config }}" in
            sync)     M="[$sync]" ;;
            libuv)    M="[$uv]" ;;
            libevent) M="[$ev]" ;;
            *)        M="[$sync,$uv,$ev]" ;;
          esac
          echo "configurations=$M" >> "$GITHUB_OUTPUT"

  # ── Build (compile only) ────────────────────────────────────────────────
  build:
    name: build / ${{ matrix.config.release }}
    needs: get-windows-matrix
    runs-on: windows-2022

    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.get-windows-matrix.outputs.configurations) }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: ${{ env.CHECKOUT_SHA }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        shell: cmd
        run: nuget restore vs\aerospike.sln

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build aerospike library + test (${{ matrix.config.release }})
        shell: pwsh
        run: |
          msbuild vs\aerospike\aerospike.vcxproj "/p:Configuration=${{ matrix.config.release }}" /p:Platform=x64 /m /nologo
          msbuild vs\aerospike-test\aerospike-test.vcxproj "/p:Configuration=${{ matrix.config.release }}" /p:Platform=x64 /m /nologo

      # Debug library (packaging only, no tests)
      - name: Build aerospike library (${{ matrix.config.debug }})
        if: ${{ inputs.run-package == true }}
        shell: pwsh
        run: |
          msbuild vs\aerospike\aerospike.vcxproj "/p:Configuration=${{ matrix.config.debug }}" /p:Platform=x64 /m /nologo

      # Release artifact is uploaded unconditionally — the test job needs it.
      - name: Upload Release artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-windows-${{ matrix.config.release }}
          path: vs\x64\${{ matrix.config.release }}\
          retention-days: 1

      - name: Upload Debug artifact
        if: ${{ inputs.run-package == true }}
        uses: actions/upload-artifact@v4
        with:
          name: build-windows-${{ matrix.config.debug }}
          path: vs\x64\${{ matrix.config.debug }}\
          retention-days: 1

  # ── Test (self-hosted) ──────────────────────────────────────────────────
  # Downloads the Release build output, brings up Aerospike in a Linux Docker
  # container, and runs the test binary from the repo root (it loads UDFs from
  # src/test/lua), so a checkout is required alongside the artifact.
  test:
    name: test / ${{ matrix.config.release }}
    needs: [get-windows-matrix, build]
    runs-on: [self-hosted, windows, x64]

    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.get-windows-matrix.outputs.configurations) }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Start Aerospike server
        run: docker run -d -p 3000:3000 --name aerospike aerospike/aerospike-server

      - name: Download Release artifact (${{ matrix.config.release }})
        uses: actions/download-artifact@v4
        with:
          name: build-windows-${{ matrix.config.release }}
          path: vs\x64\${{ matrix.config.release }}

      - run: sleep 5

      - name: Run tests
        shell: pwsh
        run: |
          & "vs\x64\${{ matrix.config.release }}\aerospike-test.exe" -h 127.0.0.1 -p 3000
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Dump server logs
        if: failure()
        shell: pwsh
        run: docker logs aerospike 2>&1 || true

  # ── Package ───────────────────────────────────────────────────────────────
  # Downloads the pre-built artifacts, restores NuGet dependency packages, then
  # runs nuget pack — no MSBuild rebuild needed. Gated on the tests passing.
  build-package-windows:
    name: package / windows-x64
    if: ${{ inputs.run-package == true }}
    needs: [get-windows-matrix, build, test]
    runs-on: windows-2022

    steps:
      # No submodules needed — this job only reads vs\*.nuspec and vs\aerospike.sln;
      # no C source compilation takes place here.
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_SHA }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      # Populates vs\packages\ with .nuspec dependency DLLs (pthreads, openssl,
      # lua, libyaml).
      - name: Restore NuGet packages
        shell: cmd
        run: nuget restore vs\aerospike.sln

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: build-windows-*
          path: build-artifacts

      # Config list comes straight from the matrix (release + debug names),
      # so it tracks the `config` input instead of a hardcoded set.
      - name: Restore artifacts to vs\x64\
        shell: pwsh
        run: |
          $entries = '${{ needs.get-windows-matrix.outputs.configurations }}' | ConvertFrom-Json
          $configs = $entries | ForEach-Object { $_.release; $_.debug }
          foreach ($config in $configs) {
            $src = "build-artifacts\build-windows-$config"
            $dst = "vs\x64\$config"
            New-Item -ItemType Directory -Force -Path $dst | Out-Null
            if (Test-Path $src) {
              Copy-Item "$src\*" $dst -Recurse -Force
              Write-Host "Restored: $config"
            } else {
              Write-Warning "Artifact not found for: $config"
            }
          }

      - name: Pack NuGet packages
        shell: cmd
        working-directory: vs
        run: |
          nuget pack aerospike-client-c.nuspec
          nuget pack aerospike-client-c-libuv.nuspec
          nuget pack aerospike-client-c-libevent.nuspec

      - name: Upload Windows NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: packages-windows-x64
          path: vs\*.nupkg
          if-no-files-found: error
          retention-days: 1

  # ── Summary ───────────────────────────────────────────────────────────────
  summary:
    name: summary
    if: always()
    needs:
      - build
      - test
      - build-package-windows
    runs-on: ubuntu-24.04

    steps:
      # Per-config test logs uploaded by the test job (test-log-<config>).
      - name: Download test logs
        if: always()
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: test-log-*
          path: test-logs

      - name: Write combined summary
        shell: bash
        run: |
          BUILD="${{ needs.build.result }}"
          TEST="${{ needs.test.result }}"
          PKG_WIN="${{ needs.build-package-windows.result }}"

          icon() {
            case "$1" in
              success) echo "✅" ;; failure) echo "❌" ;;
              skipped) echo "⏭️" ;; *) echo "⚠️" ;;
            esac
          }

          S="$GITHUB_STEP_SUMMARY"
          cat >> "$S" <<EOF
          ## Aerospike C Client — Windows Run Summary

          | | Value |
          |---|---|
          | **Server tag** | \`${{ env.SERVER_TAG }}\` |
          | **Config** | \`${{ inputs.config || 'all' }}\` |
          | **Packages built** | \`${{ inputs.run-package }}\` |

          | Job | Runner | Result |
          |---|---|---|
          | Build (windows-x64) | github-hosted | $(icon $BUILD) \`$BUILD\` |
          | Test (windows-x64) | self-hosted | $(icon $TEST) \`$TEST\` |
          | Package (.nupkg × 3) | github-hosted | $(icon $PKG_WIN) \`$PKG_WIN\` |
          EOF

          # ── Combined test report across every configuration ───────────────
          shopt -s nullglob
          dirs=(test-logs/test-log-*)
          if [ ${#dirs[@]} -eq 0 ]; then
            printf '\n### Test report\n\n_No test logs were produced._\n' >> "$S"
            exit 0
          fi

          {
            printf '\n### Test report (all configurations)\n\n'
            printf '| Configuration | Result | Tests |\n|---|---|---|\n'
          } >> "$S"

          for dir in "${dirs[@]}"; do
            cfg="${dir#test-logs/test-log-}"
            code="$(cat "$dir/exit-code.txt" 2>/dev/null || echo '?')"
            headline="$(grep -E '^[0-9]+ tests:' "$dir/test-output.log" 2>/dev/null | tail -1)"
            case "$code" in
              0) ic="✅" ;; '?') ic="⚠️" ;; *) ic="❌" ;;
            esac
            printf '| `%s` | %s `exit %s` | %s |\n' "$cfg" "$ic" "$code" "${headline:-n/a}" >> "$S"
          done

          # Per-config full output (last 800 lines), collapsed.
          for dir in "${dirs[@]}"; do
            cfg="${dir#test-logs/test-log-}"
            {
              printf '\n<details><summary>Full output — %s</summary>\n\n' "$cfg"
              printf '```\n'
              tail -n 800 "$dir/test-output.log" 2>/dev/null || echo '(log missing)'
              printf '```\n</details>\n'
            } >> "$S"
          done
