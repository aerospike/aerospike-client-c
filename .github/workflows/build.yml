name: Aerospike C Client Tests

on:
  push:
    branches: [master, stage]
  pull_request:
    branches: [master, stage]

permissions:
  id-token: write
  contents: read

jobs:
  builds-and-runs-on-linux:
    strategy:
      fail-fast: false
      matrix:
        os: [ "${{ vars.RUNS_ON_LINUX_INTEL }}", "${{ vars.RUNS_ON_LINUX_ARM }}" ]
        config: ["sync", "libev", "libuv", "libevent"]
        valgrind: ["", "-valgrind"]
    runs-on: "${{ matrix.os }}"
    env:
      LD_LIBRARY_PATH: /usr/local/lib
    steps:
      - name: Checkout client
        uses: actions/checkout@v2
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Aerospike Database
        uses: aerospike/shared-workflows/.github/actions/setup-aerospike-server@d71692306c9e2a076b2354dbe08af95b27ca370c # latest main
        with:
          server-tag: 8.1.2.0
          oidc-provider: ${{ vars.SHAREDWORKFLOW_DB_OIDC_PROVIDER }}
          oidc-audience: ${{ vars.SHAREDWORKFLOW_DB_OIDC_AUDIENCE }}
          config-content: |
            service {
              feature-key-file /etc/aerospike/features.conf
              cluster-name docker
              proto-fd-max 15000
            }
            logging {
              console {
                context any info
              }
            }
            network {
              service {
                address any
                port 3000
              }
              heartbeat {
                mode mesh
                port 3002
              }
              fabric {
                port 3001
              }
            }
            namespace test {
              default-ttl 0
              replication-factor 1
              nsup-period 60
              allow-ttl-without-nsup true
              storage-engine memory {
                  data-size 4G
              }
            }
      - name: Dump server info and config
        run: |
          docker exec aerospike-1 asd --version
          docker exec aerospike-1 asinfo -v build
          docker exec aerospike-1 asinfo -v status
          docker exec aerospike-1 asinfo -v service
          docker exec aerospike-1 asinfo -v namespaces
          docker exec aerospike-1 asinfo -v "namespace/test"
          docker exec aerospike-1 asinfo -v "get-config:"
          docker exec aerospike-1 asinfo -v "get-config:context=service"
          docker exec aerospike-1 asinfo -v "get-config:context=network"
          docker exec aerospike-1 asinfo -v "get-config:context=namespace;id=test"
          docker exec aerospike-1 asinfo -v statistics
          docker exec aerospike-1 cat /etc/aerospike/aerospike.conf
          docker logs aerospike-1
      - run: ./install_libev
        if: matrix.config == 'libev'
      - run: ./install_libuv
        if: matrix.config == 'libuv'
      - run: ./install_libevent
        if: matrix.config == 'libevent'
      - run: make
        if: matrix.config == 'sync'
      - run: make EVENT_LIB=${{ matrix.config }}
        if: matrix.config != 'sync'
      - run: make test
        if: matrix.config == 'sync' && matrix.os != vars.RUNS_ON_WINDOWS_INTEL
      - run: make EVENT_LIB=${{ matrix.config }} test
        if: matrix.config != 'sync' && matrix.os != vars.RUNS_ON_WINDOWS_INTEL
      - run: make test-valgrind
        if: matrix.config == 'sync' && matrix.os == vars.RUNS_ON_WINDOWS_INTEL
      - run: make EVENT_LIB=${{ matrix.config }} test-valgrind
        if: matrix.config != 'sync' && matrix.os == vars.RUNS_ON_WINDOWS_INTEL

  builds-and-runs-on-mac-intel:
    strategy:
      fail-fast: false
      matrix:
        config: ["sync", "libev", "libuv", "libevent"]
    runs-on: macos-26-intel
    steps:
      - run: brew install wget
      - run: brew install automake
      - run: brew install libtool
      - run: brew install openssl
      - run: brew install libyaml
      - name: Checkout client
        uses: actions/checkout@v2
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up ASDB for macOS
        uses: ./.github/actions/setup-asdb-on-macos-intel
      - run: ./install_libev
        if:  matrix.config == 'libev' }}
      - run: ./install_libuv
        if:  matrix.config == 'libuv' }}
      - run: ./install_libevent
        if:  matrix.config == 'libevent' }}
      - run: make
        if:  matrix.config == 'sync' }}
      - run: make EVENT_LIB=${{ matrix.config }}
        if:  matrix.config != 'sync' }}
      - run: make test
        if:  matrix.config == 'sync' }}
      - run: make EVENT_LIB=${{ matrix.config }} test
        if:  matrix.config != 'sync' }}

  builds-on-mac-arm:
    strategy:
      fail-fast: false
      matrix:
        config: ["sync", "libev", "libuv", "libevent"]
    runs-on: macos-latest
    steps:
    - run: brew install wget
    - run: brew install automake
    - run: brew install libtool
    - run: brew install openssl
    - run: brew install libyaml
    - name: Checkout client
      uses: actions/checkout@v2
      with:
        submodules: recursive
        token: ${{ secrets.GITHUB_TOKEN }}
    - run: ./install_libev
      if:  matrix.config == 'libev' }}
    - run: ./install_libuv
      if:  matrix.config == 'libuv' }}
    - run: ./install_libevent
      if:  matrix.config == 'libevent' }}
    - run: make
      if:  matrix.config == 'sync' }}
    - run: make EVENT_LIB=${{ matrix.config }}
      if:  matrix.config != 'sync' }}

  builds-on-windows:
    strategy:
      fail-fast: false
      matrix:
        configuration: ["Debug", "Debug libuv", "Debug libevent", "Release", "Release libuv", "Release libevent"]
        platform: [x64]
    runs-on: ${{ matrix.platform == 'x64' && vars.RUNS_ON_WINDOWS_INTEL || vars.RUNS_ON_WINDOWS_ARM }}
    steps:
    - name: Checkout client
      uses: actions/checkout@v2
      with:
        submodules: recursive
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: Set up msbuild
      uses: microsoft/setup-msbuild@v2
    - name: Restore nuget and dependencies
      run: |
        cd vs
        nuget restore aerospike.sln
    - name: Build
      run: |
        cd vs
        msbuild aerospike.sln `
          -property:Configuration="${{ matrix.configuration }}" `
          -property:Platform="${{ matrix.platform }}"
