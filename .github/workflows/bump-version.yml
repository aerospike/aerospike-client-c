name: Bump Version
run-name: >-
  ${{ format('Bump version to {0}{1}', inputs.version, inputs.dry-run && ' (dry-run)' || '') }}

# Advances the version in all 5 locations kept in sync by pkg/set_version:
#   src/include/aerospike/version.h
#   src/main/aerospike/version.c
#   vs/aerospike-client-c.nuspec
#   vs/aerospike-client-c-libuv.nuspec
#   vs/aerospike-client-c-libevent.nuspec
#
# This workflow commits the version bump only. Tagging happens after stage is
# merged to master via announce-release.yml.
#
# Full release flow:
#   1. Run bump-version.yml -> version commit on stage-test -> push triggers stage build
#   2. Open PR: stage -> master -> review -> merge
#   3. announce-release.yml tags the merge-base commit and starts release work

permissions:
  contents: write  # commit and push version bump
  actions: write   # dispatch push-to-stage.yml

on:
  # push:
  #   branches: [CLIENT-4300-release-pipeline-new]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 7.5.0 or 7.5.0-rc1)'
        required: true
        type: string
      branch:
        description: 'Branch to bump (default: stage)'
        required: false
        type: string
        default: abc
      dry-run:
        description: 'Show what would change without committing or tagging'
        required: false
        type: boolean
        default: false

defaults:
  run:
    shell: bash

jobs:
  bump:
    name: bump version
    runs-on: ubuntu-24.04
    env:
      TARGET_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || '7.4.1-test-4' }}
      TARGET_BRANCH:  ${{ github.event_name == 'workflow_dispatch' && inputs.branch || 'stage-test' }}
      IS_DRY_RUN:     'false'
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 1

      - name: Run pkg/set_version
        run: |
          set -euo pipefail
          echo "Setting version to: $TARGET_VERSION"
          if [ "$IS_DRY_RUN" = "true" ]; then
            echo "[dry-run] Would run: ./pkg/set_version $TARGET_VERSION"
            echo "Files that would be updated:"
            echo "  src/include/aerospike/version.h"
            echo "  src/main/aerospike/version.c"
            echo "  vs/aerospike-client-c.nuspec"
            echo "  vs/aerospike-client-c-libuv.nuspec"
            echo "  vs/aerospike-client-c-libevent.nuspec"
          else
            ./pkg/set_version "$TARGET_VERSION"
          fi

      - name: Commit version bump
        if: ${{ env.IS_DRY_RUN != 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit — version already at $TARGET_VERSION"
          else
            git commit -m "update version to $TARGET_VERSION"
            git push origin "$TARGET_BRANCH"
            echo "Committed and pushed to $TARGET_BRANCH"
            echo "Release build will start from the push trigger on push-to-stage.yml"
          fi

      - name: Summary
        run: |
          {
            echo "## Version Bump"
            echo ""
            echo "| Parameter | Value |"
            echo "| :--- | :--- |"
            echo "| Version | \`$TARGET_VERSION\` |"
            echo "| Branch  | \`$TARGET_BRANCH\` |"
            echo "| Dry run | \`$IS_DRY_RUN\` |"
            echo ""
            if [ "$IS_DRY_RUN" = "true" ]; then
              echo "> **Dry run** — no commits were made."
            else
              echo "- Pushed to \`$TARGET_BRANCH\`; \`push-to-stage.yml\` runs on that push."
              echo ""
              echo "_Next step: open a PR from \`$TARGET_BRANCH\` to \`master\`._"
              echo "_When the PR is merged, \`announce-release.yml\` will tag the commit and start release work._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
