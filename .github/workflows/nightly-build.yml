name: Nightly Trigger Build

# ─────────────────────────────────────────────────────────────────────────────
# Runs every night at 5 AM UTC against the full distro × arch matrix.
# Only executes on the stage branch — schedule trigger is skipped on all other refs.
# workflow_dispatch is also restricted to stage.
#
# Calls build-and-test.yml with vars.LINUX_DISTRO_MATRIX (all distros × arches)
# × selected event libs.
#
# Branch-protection check name (if required): "nightly / summary"
# ─────────────────────────────────────────────────────────────────────────────

run-name: "Nightly — ${{ github.ref_name }}"

permissions:
  contents: read
  id-token: write   # OIDC — required by setup-aerospike-server inside build-and-test.yml
  checks: write     # harden-runner writes audit annotations to the check run

on:
  schedule:
    - cron: '0 5 * * *' # Daily at 5:00 AM UTC — always runs on the default branch
  workflow_dispatch:
    branches:
      - stage   # manual dispatch restricted to stage branch only


# Do NOT cancel in-progress nightly runs — let them finish.
# A new nightly will queue behind the current one rather than interrupting it.
concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Job name "nightly" → branch-protection check name would be "nightly / summary"
  # Always builds from stage regardless of which branch triggered the schedule.
  nightly:
    uses: ./.github/workflows/build-and-test.yml
    with:
      ref:          stage
      matrix-json:  ${{ vars.LINUX_DISTRO_MATRIX }}
      runners-json: ${{ vars.LINUX_RUNNERS || '{"amd64":"ubuntu-24.04","arm64":"ubuntu-24.04-arm"}' }}
      event-lib:    all
      server-tag:   latest
      num-nodes:    '1'
      valgrind:     true
      run-mac:      true
      run-windows:  true
    secrets: inherit
