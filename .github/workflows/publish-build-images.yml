# name: Publish Optimized Build Images (JFrog)

# run-name: >-
#   publish build images — distro=${{ inputs.distro || 'all' }},
#   version=${{ inputs.version }}, push=${{ inputs.push }}

# # ─────────────────────────────────────────────────────────────────────────────
# # Builds the OPTIMIZED build-environment images (docker/build-optimized/<distro>/
# # Dockerfile) for amd64 + arm64 and publishes them to JFrog Artifactory.
# #
# # The JFrog part is NOT hand-rolled here — it is delegated to the shared
# # reusable workflow:
# #   aerospike/shared-workflows/.github/workflows/reusable_docker-build-deploy.yaml
# # which handles OIDC login, QEMU+buildx multi-arch build, version tagging,
# # SBOM, provenance, attestation and JFrog build-info publishing. This caller is
# # modeled on shared-workflows' example_docker-test.yaml, fanned out over the 8
# # optimized distros via a matrix.
# #
# # NOTE: the reusable workflow builds both architectures in ONE job using
# # QEMU emulation (platforms: linux/amd64,linux/arm64). Because the optimized
# # Dockerfiles compile doxygen/libuv/libev/libevent from source, the emulated
# # arm64 build can be slow — expect long run times. Set `arch`-style native
# # splitting in the shared workflow if that becomes a problem.
# # ─────────────────────────────────────────────────────────────────────────────

