# # Permissions the reusable workflow actually needs:
# #   contents: read      → checkout
# #   id-token: write     → JFrog OIDC login
# #   attestations: write → SLSA build-provenance attestation
# # NOTE: no `packages: write` — that is the GHCR/GitHub Packages scope; we publish
# # to JFrog Artifactory (auth via OIDC + docker login), so it is unused here.
# permissions:
#   contents: read
