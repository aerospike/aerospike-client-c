name: Publish Optimized Build Images (JFrog)

run-name: >-
  publish build images — distro=${{ inputs.distro || 'all' }},
  version=${{ inputs.version }}

# ─────────────────────────────────────────────────────────────────────────────
# Builds the OPTIMIZED build-environment images (docker/build-optimized/<distro>/
# Dockerfile) for amd64 + arm64 and publishes them to JFrog Artifactory.
#
# Delegates entirely to the shared reusable workflow:
#   aerospike/shared-workflows/.github/workflows/reusable_docker-build-deploy.yaml
# which handles OIDC login, QEMU+buildx multi-arch build, version tagging,
# SBOM, provenance, attestation and JFrog build-info publishing.
#
# Fanned out over the 8 optimized distros via a matrix.
#
# Image pushed to:
#   artifact.aerospike.io/<jf-project>-docker-dev-local/aerospike-client-c-<distro>
#
# Tags produced (default):
#   :<version>_<timestamp>  ← immutable, always produced
#   :<version>              ← mutable semver
#   :<major>                ← mutable major  (e.g. :1)
#   :latest                 ← mutable latest
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [test-workflow-stage]
  workflow_dispatch:
    inputs:
      distro:
        type: choice
        required: false
        default: amazonlinux-2023
        description: 'Linux distro to build (choose "all" to build every distro)'
        options:
          - all
          - rhel-8
          - rhel-9
          - rhel-10
          - amazonlinux-2023
          - debian-12
          - debian-13
          - ubuntu-22.04
          - ubuntu-24.04
      version:
        type: string
        required: false
        default: "1.0.0"
        # Build-env image's OWN version — intentionally decoupled from the C
        # client release. The toolchain image is versioned on its own track; a
        # client bump (7.4.0 → 7.5.0) should NOT force a build-env retag.
        description: 'Build-env image version (independent of the C client version)'
      # JFrog config — repo variable + secrets:
      #   vars.JF_PROJECT               (e.g. clients)          ← non-sensitive, repo variable
      #   vars.JFROG_OIDC_PROVIDER           (e.g. gh-aerospike) ← repo variable
      #   vars.JFROG_OIDC_AUDIENCE          (e.g. aerospike)    ← repo variable

# Permissions required by the reusable workflow (caller is the ceiling).
# The reusable job declares all four regardless of inputs, so the caller must
# grant them all even if not functionally used:
#   contents: read      → checkout
#   id-token: write     → GitHub OIDC token exchange → JFrog Artifactory login
#   attestations: write → declared by reusable job (attest: false disables the step,
#                         but the permission must still be allowed at caller level)
#   packages: write     → declared by reusable job (unused — we push to JFrog, not GHCR)
permissions:
  contents: read
  id-token: write
  attestations: write
  packages: write

concurrency:
  group: c-client-image-deploy-jfrog
  cancel-in-progress: false

jobs:
  # ── Resolve the distro list from the dispatch input ─────────────────────────
  resolve:
    name: resolve / distro list
    runs-on: ubuntu-22.04
    outputs:
      distros: ${{ steps.gen.outputs.distros }}
    steps:
      - id: gen
        shell: bash
        run: |
          DISTRO_IN="${{ inputs.distro }}"
          if [[ -z "$DISTRO_IN" || "$DISTRO_IN" == "all" ]]; then
            DISTROS='["rhel-8","rhel-9","rhel-10","amazonlinux-2023","debian-12","debian-13","ubuntu-22.04","ubuntu-24.04"]'
          else
            DISTROS="[\"$DISTRO_IN\"]"
          fi
          echo "distros=$DISTROS" >> "$GITHUB_OUTPUT"
          echo "Distros: $DISTROS"

  # ── Build + publish each distro via the shared reusable workflow ─────────────
  # One call per distro; the reusable builds linux/amd64 + linux/arm64 via QEMU
  # and pushes a multi-arch manifest to JFrog.
  publish:
    name: publish / ${{ matrix.distro }}
    needs: resolve
    strategy:
      fail-fast: false
      matrix:
        distro: ${{ fromJSON(needs.resolve.outputs.distros) }}
    uses: aerospike/shared-workflows/.github/workflows/reusable_docker-build-deploy.yaml@v3.6.0
    secrets: inherit
    with:
      jf-project:         ${{ vars.JF_PROJECT }}
      image-name:         aerospike-client-c-${{ matrix.distro }}
      app-name:           Aerospike C Client build env (${{ matrix.distro }})
      app-version:        ${{ inputs.version || '1.0.0' }}
      context:            .
      file:               docker/build-optimized/${{ matrix.distro }}/Dockerfile
      jf-build-name:      aerospike-c-client-build-${{ matrix.distro }}
      platforms:          linux/amd64,linux/arm64
      push:               true
      attest:             false
      oidc-provider-name: ${{ vars.JFROG_OIDC_PROVIDER }}
      oidc-audience:      ${{ vars.JFROG_OIDC_AUDIENCE }}

  # ── Summary ──────────────────────────────────────────────────────────────────
  # Runs always so we get a summary even on failure/cancellation.
  summary:
    name: summary
    if: always()
    needs: [resolve, publish]
    runs-on: ubuntu-22.04
    steps:
      - name: Write run summary
        shell: bash
        run: |
          icon() {
            case "$1" in
              success)   echo "✅" ;;
              failure)   echo "❌" ;;
              skipped)   echo "⏭️" ;;
              cancelled) echo "🚫" ;;
              *)         echo "⚠️" ;;
            esac
          }

          VERSION="${{ inputs.version }}"
          DISTRO="${{ inputs.distro || 'all' }}"
          JF_PROJECT="${{ vars.JF_PROJECT }}"
          REGISTRY="artifact.aerospike.io/${JF_PROJECT}-docker-dev-local"

          {
            echo "## Optimized Build Images — Run Summary"
            echo ""
            echo "### Inputs"
            echo "| | Value |"
            echo "|---|---|"
            echo "| **Distro** | \`${DISTRO}\` |"
            echo "| **Version** | \`${VERSION}\` |"
            echo "| **JFrog project** | \`${JF_PROJECT:-n/a}\` |"
            echo "| **Platforms** | \`linux/amd64, linux/arm64\` |"
            echo "| **Shared workflow** | \`reusable_docker-build-deploy.yaml@v3.6.0\` |"
            echo ""
            echo "### Result"
            echo "| | Value |"
            echo "|---|---|"
            echo "| **Publish result** | $(icon "${{ needs.publish.result }}") \`${{ needs.publish.result }}\` |"
            echo "| **Registry** | \`${REGISTRY}\` |"
            echo "| **Image pattern** | \`${REGISTRY}/aerospike-client-c-<distro>\` |"
            echo "| **Tags produced** | \`${VERSION}_<timestamp>\`, \`${VERSION}\`, \`<major>\`, \`latest\` |"
            echo "| **SBOM + provenance** | attached to image manifest in JFrog |"
          } >> "$GITHUB_STEP_SUMMARY"
