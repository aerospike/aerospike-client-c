  ########################################################
  # The following jobs demonstrate how to use deployed artifacts.
  ########################################################
  use-artifacts:
    needs: [artifacts-cicd, extract-version]
    runs-on: ubuntu-22.04
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit
      - name: Install JFrog CLI
        id: jf
        uses: step-security/setup-jfrog-cli@893a92f96c7727242adf0e603c77b1f2a22390e1 # v4.9.1
        env:
          JF_URL: https://artifact.aerospike.io
          JF_PROJECT: database
        with:
          oidc-provider-name: gh-aerospike
          oidc-audience: aerospike
      - name: Install packages
        run: |
          set -euo pipefail
          wget -qO - https://artifact.aerospike.io/artifactory/api/security/keypair/aerospike/public \
          | sudo gpg --dearmor -o /usr/share/keyrings/aerospike.gpg

          export DEBIAN_FRONTEND=noninteractive
          CODENAME=$(lsb_release -sc)
          ARCH=$(dpkg --print-architecture)
          KEYRING=/usr/share/keyrings/aerospike.gpg
          REPO="artifact.aerospike.io/artifactory/database-deb-dev-local"

          sudo install -m 600 /dev/null /etc/apt/auth.conf.d/aerospike.conf
          {
            echo "machine artifact.aerospike.io"
            echo "login ${{ steps.jf.outputs.oidc-user }}"
            echo "password ${{ steps.jf.outputs.oidc-token }}"
          } | sudo tee /etc/apt/auth.conf.d/aerospike.conf >/dev/null

          cat <<EOF | sudo tee /etc/apt/sources.list.d/aerospike.list
          deb [arch=$ARCH signed-by=$KEYRING] https://$REPO $CODENAME main
          EOF

          echo "FAILURE EXPECTED HERE"
          echo "I know this is the wrong package to install...need to find out the right one"
          sudo apt-get update && sudo apt-get install -y aerospike-client-c

