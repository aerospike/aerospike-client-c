name: Example Artifacts CI/CD
on:
  workflow_dispatch:
  pull_request:
    branches:
      - stage

# workflow_call:
#   inputs:
#     version:
#       description: Version override (leave empty for auto-detection)
#       required: false
#       default: ""
#       type: string

permissions:
  id-token: write
  contents: read
  packages: write
  attestations: write

concurrency:
  group: jfrog-test-deploy
  cancel-in-progress: false


jobs:
  extract-version:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Full history + tags so `git describe --tags` can resolve the
          # nearest release tag instead of falling through to 0.0.0-dev+<sha>.
          fetch-depth: 0
      - name: Extract version
        id: extract
        uses: aerospike/shared-workflows/.github/actions/extract-version-from-tag@07c958ca4c5cea494dc8790949c08e3fb28c55e1 # v3.3.0
    outputs:
      version: ${{ steps.extract.outputs.version }}
      git_tag: ${{ steps.extract.outputs.git_tag }}

  artifacts-cicd:
    uses: aerospike/shared-workflows/.github/workflows/reusable_artifacts-cicd.yaml@v3.4.1
    needs: extract-version
    with:
      gh-workflows-ref: v3.4.1
      jf-project: database
      jf-build-name: aerospike-client-c
      version: ${{ needs.extract-version.outputs.version }}
      gh-artifact-directory: target/packages
      matrix-json: >-
        {"include":[
          {
            "runs-on":"ubuntu-22.04",
            "distro":"el10",
            "base-image":"registry.access.redhat.com/ubi10/ubi",
            "arch":"x86_64",
            "build-script": "pwd && ls -la && find . && ./.github/bash_scripts/build-script-el.sh",
            "build-env":"EMULATED=false",
          },
        ]}
      oidc-provider-name: gh-aerospike
      oidc-audience: aerospike
      dry-run: false
      sign-mac: true
      mac-signing-identity: "Developer ID Application: Aerospike, Inc. (22224RFU67)"
      mac-installer-identity: "Developer ID Installer: Aerospike, Inc. (22224RFU67)"
      mac-artifact-glob: "*.pkg"
      mac-notarize: true
      build-script: |
          pwd
          find .
    secrets:
      gpg-private-key: ${{ secrets.GPG_SECRET_KEY }}
      gpg-public-key: ${{ secrets.GPG_PUBLIC_KEY }}
      gpg-key-pass: ${{ secrets.GPG_PASS }}
      es-username: ${{ secrets.ES_USERNAME }}
      es-password: ${{ secrets.ES_PASSWORD }}
      credential_id: ${{ secrets.CREDENTIAL_ID }}
      es-totp_secret: ${{ secrets.ES_TOTP_SECRET }}
      apple-application-cert: ${{ secrets.APPLE_APPLICATION_CERT }}
      apple-id: ${{ secrets.APPLE_ID }}
      apple-installer-cert: ${{ secrets.APPLE_INSTALLER_CERT }}
      apple-cert-password: ${{ secrets.APPLE_CERT_PASSWORD }}
      apple-notarization-password: ${{ secrets.APPLE_NOTARIZATION_PASSWORD }}
      apple-team-id: ${{ secrets.APPLE_TEAM_ID }}


