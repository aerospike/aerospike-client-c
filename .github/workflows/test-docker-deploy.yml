# name: Publish Optimized Build Images (JFrog)

# run-name: >-
#   publish build images — distro=${{ inputs.distro || 'all' }},
#   arch=${{ inputs.arch || 'all' }}, push=${{ inputs.push }}

# # ─────────────────────────────────────────────────────────────────────────────
# # Builds the OPTIMIZED build-environment images (docker/build-optimized/<distro>/
# # Dockerfile) for amd64 AND arm64 on native-arch runners, and pushes them to a
# # JFrog Artifactory Docker registry.
# #
# #   resolve     – expand distro/arch inputs into a {distro,arch,runner} matrix
# #   build-push  – on the matching-arch runner (x86_64 or arm), docker build the
# #                 image with --platform linux/<arch>, tag it
# #                   <registry>/<repo>/aerospike-c-build:optimized-<arch>-<distro>
# #                 and (when push=true) push it to JFrog
# #   manifest    – (arch=all + push only) fuse the per-arch tags into one
# #                 multi-arch tag  …:optimized-<distro>  via buildx imagetools
# #
# # Architecture → runner (native, no QEMU):
# #   amd64 (x86_64) → ubuntu-24.04        arm64 → ubuntu-24.04-arm
# # (Swap for [self-hosted, linux, <arch>] if hosted arm64 is unavailable.)
# #
# # Required configuration (Settings → Secrets and variables → Actions):
# #   vars.JFROG_REGISTRY   e.g. mycompany.jfrog.io        (Docker registry host)
# #   vars.JFROG_REPO       e.g. ecosystem-docker-dev      (Artifactory repo key)
# #   secrets.JFROG_USERNAME
# #   secrets.JFROG_PASSWORD  (password or identity/access token)
# # ─────────────────────────────────────────────────────────────────────────────

